name: UAT End-to-End Pipeline

on:
  pull_request:
    branches:
      - uat
    paths:
      - 'force-app/**'
      - '.github/workflows/e2e-uat-pipeline.yml'
      - '.github/sf-scanner-waivers.csv'
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - ready_for_review
  pull_request_review:
    types:
      - submitted
  workflow_dispatch:
    inputs:
      scanner:
        description: 'Scanner to run'
        type: choice
        options:
          - all
          - checkmarx
          - fortify
        default: all
      action:
        description: 'Action to perform'
        type: choice
        options:
          - deploy
          - rollback
        default: deploy
      rollback_commit_sha:
        description: 'Commit SHA to rollback to'
        type: string
      rollback_pr_number:
        description: 'PR number for context'
        type: string

env:
  ORG_ALIAS: ${{ vars.ORG_ALIAS || 'uat' }}
  COVERAGE_THRESHOLD: ${{ vars.COVERAGE_THRESHOLD || '85' }}
  SOURCE_DIR: ${{ vars.SOURCE_DIR || 'force-app/main/default' }}
  SFDX_AUTH_SECRET_NAME: ${{ vars.SFDX_AUTH_SECRET_NAME || 'CRT_UAT_AUTHURL' }}
  DELTA_FROM_COMMIT: ${{ vars.DELTA_FROM_COMMIT || '' }}
  FCLI_BOOTSTRAP_VERSION: ${{ vars.FCLI_BOOTSTRAP_VERSION || '3.0.0' }}
  SCA_ENFORCEMENT_MODE: ${{ vars.SCA_ENFORCEMENT_MODE || 'enforce' }}

jobs:
  # Job 1: Evaluate Scanner Availability
  setup:
    name: Setup & Scanner Availability
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request_review'
    outputs:
      run-checkmarx: ${{ steps.scanners.outputs.run-checkmarx }}
      run-fortify: ${{ steps.scanners.outputs.run-fortify }}
    steps:
      - name: Evaluate CheckMarx availability
        id: scanners
        env:
          CX_SECRET: ${{ secrets.CX_CLIENT_SECRET }}
          FOD_SECRET: ${{ secrets.FOD_CLIENT_SECRET }}
        run: |
          echo "run-checkmarx=${{ env.CX_SECRET != '' }}" >> $GITHUB_OUTPUT
          echo "run-fortify=${{ env.FOD_SECRET != '' }}" >> $GITHUB_OUTPUT

  # Job 2: Salesforce PR Validation
  salesforce-validation:
    name: Salesforce PR Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [setup]
    outputs:
      has_delta: ${{ steps.delta-check.outputs.has_delta }}
    permissions:
      contents: read
      pull-requests: read
      checks: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bootstrap package.json if missing
        run: |
          if [ ! -f package.json ]; then
            cat > package.json << 'EOF'
          {
            "name": "salesforce-project",
            "version": "1.0.0",
            "description": "Salesforce project",
            "scripts": {
              "test": "jest",
              "lint": "eslint src",
              "format": "prettier --write src"
            },
            "devDependencies": {
              "@lwc/eslint-plugin-lwc": "^1.7.0",
              "@salesforce/eslint-config-lwc": "^3.6.0",
              "@salesforce/sfdx-scanner": "^4.0.0",
              "eslint": "^8.48.0",
              "prettier": "^3.0.0",
              "jest": "^29.0.0",
              "husky": "^8.0.0",
              "lint-staged": "^14.0.0"
            }
          }
          EOF
          fi

      - name: Install dependencies
        run: npm install

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate Salesforce Org
        env:
          SFDX_AUTH_URL: ${{ secrets[env.SFDX_AUTH_SECRET_NAME] }}
        run: |
          echo "$SFDX_AUTH_URL" > ./auth.url
          sf org login sfdx-url --sfdx-url-file ./auth.url --alias $ORG_ALIAS --no-prompt
          rm ./auth.url

      - name: Extract test classes from PR
        id: test-classes
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            const testsMatch = body.match(/Tests:\s*([^\n]+)/);
            const tests = testsMatch ? testsMatch[1].split(',').map(t => t.trim()).filter(t => t) : [];
            core.setOutput('test-classes', JSON.stringify(tests));

      - name: Install sfdx-git-delta
        run: npm install -g sfdx-git-delta

      - name: Build delta package
        id: delta
        run: |
          sgd --to HEAD --from ${{ env.DELTA_FROM_COMMIT || 'HEAD~1' }} --output delta --generate-delta-file
          if [ -f delta/package.xml ]; then
            echo "delta_generated=true" >> $GITHUB_OUTPUT
          fi

      - name: Check for delta changes
        id: delta-check
        run: |
          if [ -f delta/package.xml ]; then
            PACKAGE_COUNT=$(grep -c "<members>" delta/package.xml || echo "0")
            if [ "$PACKAGE_COUNT" -gt 0 ]; then
              echo "has_delta=true" >> $GITHUB_OUTPUT
            else
              echo "has_delta=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "has_delta=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload delta artifact
        if: steps.delta-check.outputs.has_delta == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: delta-package
          path: delta/
          retention-days: 7

      - name: Deploy Validation (Async)
        if: steps.delta-check.outputs.has_delta == 'true'
        id: deploy-validate
        run: |
          DEPLOY_ID=$(sf project deploy validate -d delta --async --json | jq -r '.result.id')
          echo "deploy_id=$DEPLOY_ID" >> $GITHUB_OUTPUT
          
          # Poll deployment status
          until [ "$STATUS" = "Done" ]; do
            sleep 15
            RESULT=$(sf project deploy report -i $DEPLOY_ID --json)
            STATUS=$(echo $RESULT | jq -r '.result.status')
            echo "Deployment status: $STATUS"
          done

      - name: Check Code Coverage
        if: steps.delta-check.outputs.has_delta == 'true'
        run: |
          COVERAGE=$(sf apex run -f - --json <<EOF | jq '.result[0].coverage' 2>/dev/null || echo "0"
          SELECT COUNT(Id) FROM ApexCodeCoverage WHERE Coverage > $COVERAGE_THRESHOLD
          EOF
          )
          if [ "${COVERAGE:-0}" -lt $COVERAGE_THRESHOLD ]; then
            echo "❌ Code coverage $COVERAGE% is below threshold $COVERAGE_THRESHOLD%"
            exit 1
          fi
          echo "✅ Code coverage $COVERAGE% meets threshold"

      - name: Detect changed files for SCA
        if: env.SCA_ENFORCEMENT_MODE != 'off'
        id: changed-files
        run: |
          CHANGED=$(git diff --name-only ${{ env.DELTA_FROM_COMMIT || 'HEAD~1' }}..HEAD | grep -E '\.(cls|trigger|js|html|css)$' | xargs echo)
          echo "files=$CHANGED" >> $GITHUB_OUTPUT

      - name: Fetch SCA waivers from main
        if: env.SCA_ENFORCEMENT_MODE != 'off' && steps.changed-files.outputs.files != ''
        id: fetch-waivers
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const waivers = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: '.github/sf-scanner-waivers.csv',
                ref: 'main'
              });
              const content = Buffer.from(waivers.data.content, 'base64').toString();
              require('fs').writeFileSync('fetched-waivers.csv', content);
              core.setOutput('waivers-found', 'true');
            } catch (e) {
              core.setOutput('waivers-found', 'false');
            }

      - name: Run Salesforce Code Analyzer
        if: env.SCA_ENFORCEMENT_MODE != 'off' && steps.changed-files.outputs.files != ''
        id: scanner
        continue-on-error: true
        run: |
          npm install -g @salesforce/sfdx-scanner
          sf scanner run --target '${{ steps.changed-files.outputs.files }}' --format csv --outfile sfdx-report.csv --severity-threshold 3

      - name: Analyze Scanner Results with Waivers
        if: env.SCA_ENFORCEMENT_MODE != 'off' && steps.changed-files.outputs.files != ''
        id: waiver-check
        run: |
          cat > check-waivers.py << 'PYTHON_SCRIPT'
          import csv
          from datetime import datetime, timedelta
          
          def parse_date(date_str):
              for fmt in ['%d-%m-%Y', '%d/%m/%Y', '%Y-%m-%d']:
                  try:
                      return datetime.strptime(date_str, fmt)
                  except ValueError:
                      pass
              return None
          
          violations = []
          waivers = {}
          
          try:
              with open('sfdx-report.csv', 'r') as f:
                  reader = csv.DictReader(f)
                  for row in reader:
                      violations.append(row)
          except:
              print("No violations found")
          
          if [ -f fetched-waivers.csv ]; then
              with open('fetched-waivers.csv', 'r') as f:
                  reader = csv.DictReader(f)
                  for row in reader:
                      if row['status'] != 'REVOKED':
                          waivers[row['rule'] + ':' + row['file_pattern']] = row
          
          report = []
          failed = False
          
          for violation in violations:
              status = 'VIOLATION'
              expiry = None
              days_left = None
              
              for key, waiver in waivers.items():
                  if (waiver['rule'] in ['*', violation['rule']] and 
                      waiver['file_pattern'] in ['*', violation['file']]):
                      expiry_date = parse_date(waiver['expiry'])
                      if expiry_date:
                          days_left = (expiry_date - datetime.now()).days
                          if days_left > 0:
                              status = 'WAIVED_EXPIRING_SOON' if days_left <= 30 else 'WAIVED'
                          else:
                              status = 'EXPIRED_WAIVER'
                              if [ "${{ env.SCA_ENFORCEMENT_MODE }}" = "enforce" ]: failed = True
                      break
              
              report.append({
                  'Status': status,
                  'Rule': violation.get('rule', ''),
                  'File': violation.get('file', ''),
                  'Line': violation.get('line', ''),
                  'Severity': violation.get('severity', ''),
                  'Days_Left': days_left or '',
                  'Approved_By': waivers.get(key, {}).get('approved_by', ''),
                  'Ticket': waivers.get(key, {}).get('ticket', '')
              })
          
          with open('sca-governance-report.csv', 'w', newline='') as f:
              writer = csv.DictWriter(f, fieldnames=['Status', 'Rule', 'File', 'Line', 'Severity', 'Days_Left', 'Approved_By', 'Ticket'])
              writer.writeheader()
              writer.writerows(report)
          
          if failed:
              exit(1)
          PYTHON_SCRIPT
          python check-waivers.py

      - name: Upload SCA reports
        if: env.SCA_ENFORCEMENT_MODE != 'off' && steps.changed-files.outputs.files != ''
        uses: actions/upload-artifact@v4
        with:
          name: sfdx-scanner-reports
          path: |
            sfdx-report.csv
            sca-governance-report.csv
            fetched-waivers.csv
          retention-days: 30

      - name: Comment SCA Results on PR
        if: env.SCA_ENFORCEMENT_MODE != 'off' && github.event_name == 'pull_request' && steps.changed-files.outputs.files != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = 'No violations found';
            try {
              report = fs.readFileSync('sca-governance-report.csv', 'utf8');
            } catch (e) {}
            
            // Delete previous comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            for (const comment of comments.data) {
              if (comment.user.login === 'github-actions[bot]' && comment.body.includes('SCA Governance Report')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id
                });
              }
            }
            
            // Post new comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 📋 SCA Governance Report\n\n\`\`\`\n${report}\n\`\`\``
            });

  # Job 3: SCA/SAST Stage (npm audit)
  sca-sast-stage:
    name: SCA/SAST Stage (npm audit)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    needs: [setup]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bootstrap package.json if missing
        run: |
          if [ ! -f package.json ]; then
            cat > package.json << 'EOF'
          {
            "name": "salesforce-project",
            "version": "1.0.0",
            "scripts": {
              "test": "jest"
            },
            "devDependencies": {
              "eslint": "^8.0.0",
              "prettier": "^3.0.0"
            }
          }
          EOF
          fi

      - name: Install dependencies
        run: npm install

      - name: Run npm audit
        id: audit
        continue-on-error: true
        run: npm audit --json > audit-report.json

      - name: Check audit waivers
        id: check-waivers
        run: |
          cat > check-npm-waivers.py << 'PYTHON_SCRIPT'
          import json
          from datetime import datetime
          
          audit_data = json.load(open('audit-report.json'))
          waivers = {}
          
          if [ -f .github/sca-waivers.json ]; then
              waivers_data = json.load(open('.github/sca-waivers.json'))
              for waiver in waivers_data:
                  waivers[waiver['advisory']] = waiver
          
          vulnerabilities = audit_data.get('vulnerabilities', {})
          failed = False
          
          for pkg, details in vulnerabilities.items():
              for advisory in details.get('via', []):
                  if isinstance(advisory, dict):
                      advisory_id = advisory.get('range', {}).get('from', '')
                      if advisory_id in waivers:
                          expiry = datetime.fromisoformat(waivers[advisory_id]['expires'])
                          if datetime.now() > expiry:
                              print(f"❌ Expired waiver for {advisory_id}")
                              failed = True
                      else:
                          print(f"⚠️ No waiver for {advisory_id}")
          
          if failed:
              exit(1)
          PYTHON_SCRIPT
          python check-npm-waivers.py

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: audit-report.json
          retention-days: 30

  # Job 4: Automated Governance
  automated-governance:
    name: Automated Governance Gates
    runs-on: ubuntu-latest
    needs: [salesforce-validation]
    if: needs.salesforce-validation.outputs.has_delta == 'true'
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run full Apex test suite
        run: |
          sf org login sfdx-url --sfdx-url-file <(echo "${{ secrets[env.SFDX_AUTH_SECRET_NAME] }}") --alias $ORG_ALIAS --no-prompt
          sf apex run test --apex-org $ORG_ALIAS --test-level RunAllTestsInOrg --code-coverage-by-class

      - name: Verify destructive changes
        run: |
          if [ -f delta/destructiveChanges/destructiveChanges.xml ]; then
            DESTROY_COUNT=$(grep -c "<members>" delta/destructiveChanges/destructiveChanges.xml || echo "0")
            if [ "$DESTROY_COUNT" -gt 0 ]; then
              echo "⚠️ Destructive changes detected: $DESTROY_COUNT components"
            fi
          fi

  # Job 5: CheckMarx SAST
  checkmarx-sast:
    name: CheckMarx AST Scan
    runs-on: ubuntu-latest
    needs: [setup]
    if: needs.setup.outputs.run-checkmarx == 'true' && (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run CheckMarx scan
        continue-on-error: true
        run: |
          echo "CheckMarx scan placeholder"
          # Integration point for CheckMarx AST
          # Requires CX_CLIENT_SECRET

  # Job 6: Fortify SAST/DAST
  fortify-sast-dast:
    name: Fortify SAST + DAST
    runs-on: ubuntu-latest
    needs: [setup]
    if: needs.setup.outputs.run-fortify == 'true' && (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Fortify scan
        continue-on-error: true
        run: |
          echo "Fortify scan placeholder"
          # Integration point for Fortify SAST/DAST
          # Requires FOD_CLIENT_SECRET

  # Job 7: Approval & Merge Gate
  approval-merge-gate:
    name: Approval & Merge Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_review' && github.event.review.state == 'approved'
    permissions:
      contents: write
      pull-requests: write
    outputs:
      merge_commit_sha: ${{ steps.merge.outputs.merge_commit_sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify approval freshness
        run: |
          REVIEW_TIME="${{ github.event.review.submitted_at }}"
          CURRENT_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "✅ PR approved at $REVIEW_TIME"

      - name: Merge PR
        id: merge
        uses: actions/github-script@v7
        with:
          script: |
            const result = await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              merge_method: 'squash'
            });
            core.setOutput('merge_commit_sha', result.data.sha);

  # Job 8: Deploy After Merge
  deploy-after-merge:
    name: Deploy to UAT
    runs-on: ubuntu-latest
    needs: [approval-merge-gate]
    if: success()
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate Org
        env:
          SFDX_AUTH_URL: ${{ secrets[env.SFDX_AUTH_SECRET_NAME] }}
        run: |
          echo "$SFDX_AUTH_URL" > ./auth.url
          sf org login sfdx-url --sfdx-url-file ./auth.url --alias $ORG_ALIAS --no-prompt
          rm ./auth.url

      - name: Build delta package
        id: delta_pkg
        run: |
          npm install -g sfdx-git-delta
          MERGE_BASE=$(git rev-parse HEAD^1 2>/dev/null || echo "${{ env.DELTA_FROM_COMMIT }}")
          echo "merge_base=$MERGE_BASE" >> $GITHUB_OUTPUT
          sgd --to HEAD --from $MERGE_BASE --output deploy --generate-delta-file

      - name: Deploy to UAT
        id: deploy
        run: |
          DEPLOY_ID=$(sf project deploy start -d deploy --async --json | jq -r '.result.id')
          echo "deploy_id=$DEPLOY_ID" >> $GITHUB_OUTPUT
          
          until [ "$STATUS" = "Done" ]; do
            sleep 15
            RESULT=$(sf project deploy report -i $DEPLOY_ID --json)
            STATUS=$(echo $RESULT | jq -r '.result.status')
            DONE_PCT=$(echo $RESULT | jq -r '.result.numberComponentsDeployed')
            echo "Status: $STATUS | Components Deployed: $DONE_PCT"
          done

      - name: Create deployment artifact
        run: |
          mkdir -p deployment-package
          cp deploy/package.xml deployment-package/
          if [ -f deploy/destructiveChanges/destructiveChanges.xml ]; then
            cp deploy/destructiveChanges/destructiveChanges.xml deployment-package/
          fi
          cd deploy && zip -r ../deployment-package/components.zip . && cd ..
          cat > deployment-package/deployment-info.json << EOF
          {
            "timestamp": "$(date -Iseconds)",
            "merge_sha": "${{ needs.approval-merge-gate.outputs.merge_commit_sha }}",
            "delta_from": "${{ steps.delta_pkg.outputs.merge_base }}",
            "deploy_id": "${{ steps.deploy.outputs.deploy_id }}"
          }
          EOF

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: deployment-package/
          retention-days: 90

      - name: Commit package to pr_packages branch
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git checkout --orphan pr_packages 2>/dev/null || git checkout pr_packages
          cp -r deployment-package/* .
          git add .
          git commit -m "Deploy from ${{ needs.approval-merge-gate.outputs.merge_commit_sha }}" || echo "Nothing to commit"
          git push origin pr_packages --force

      - name: Update DELTA_FROM_COMMIT variable
        if: success()
        uses: actions/github-script@v7
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        with:
          script: |
            const exec = require('child_process').exec;
            const sha = '${{ needs.approval-merge-gate.outputs.merge_commit_sha }}';
            exec(`curl -L -X PATCH -H "Authorization: Bearer ${{ secrets.GH_PAT }}" -H "X-GitHub-Api-Version: 2022-11-28" https://api.github.com/repos/${{ github.repository }}/actions/variables/DELTA_FROM_COMMIT -d '{"name":"DELTA_FROM_COMMIT","value":"${sha}"}'`);

  # Job 9: Trigger CRT Tests
  trigger-crt-tests:
    name: Trigger CRT Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-after-merge]
    if: success()
    outputs:
      build_id: ${{ steps.crt.outputs.build_id }}
      crt_status: ${{ steps.crt.outputs.crt_status }}
    permissions:
      pull-requests: read
    steps:
      - name: Trigger CRT Build
        id: crt
        env:
          CRT_API_TOKEN: ${{ secrets.CRT_API_TOKEN }}
          CRT_PROJECT_ID: ${{ vars.CRT_PROJECT_ID || '73283' }}
          CRT_JOB_ID: ${{ vars.CRT_JOB_ID || '115686' }}
        run: |
          cat > trigger-crt.sh << 'SCRIPT'
          #!/bin/bash
          
          is_terminal() {
            local status=$1
            [[ "$status" =~ ^(passed|failed|error|cancelled|skipped)$ ]]
          }
          
          # Create build
          BUILD_RESPONSE=$(curl -s -X POST https://graphql.eu-robotic.copado.com/v1 \
            -H "X-Authorization: ${CRT_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"query\": \"mutation { createBuild(projectId: \\\"$CRT_PROJECT_ID\\\", jobId: \\\"$CRT_JOB_ID\\\") { id } }\"
            }")
          
          BUILD_ID=$(echo $BUILD_RESPONSE | jq -r '.data.createBuild.id')
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
          
          # Poll until terminal status
          while true; do
            BUILDS=$(curl -s -X POST https://graphql.eu-robotic.copado.com/v1 \
              -H "X-Authorization: ${CRT_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{
                \"query\": \"query { latestBuilds(projectId: \\\"$CRT_PROJECT_ID\\\", resultSize: 50) { id status } }\"
              }")
            
            STATUS=$(echo $BUILDS | jq -r '.data.latestBuilds[0].status')
            echo "CRT Status: $STATUS"
            
            if is_terminal "$STATUS"; then
              echo "crt_status=$STATUS" >> $GITHUB_OUTPUT
              break
            fi
            
            sleep 30
          done
          SCRIPT
          
          chmod +x trigger-crt.sh
          ./trigger-crt.sh

      - name: Fetch PR metadata
        id: pr_meta
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const pr = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number
              });
              core.setOutput('pr_number', pr.data.number);
              core.setOutput('pr_author', pr.data.user.login);
              core.setOutput('has_pr', 'true');
              
              // Get last approver
              const reviews = await github.rest.pulls.listReviews({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number
              });
              const approved = reviews.data.find(r => r.state === 'APPROVED');
              if (approved) {
                core.setOutput('approver', approved.user.login);
              }
            } catch (e) {
              core.setOutput('has_pr', 'false');
            }

      - name: Print Job Summary
        if: always() && steps.pr_meta.outputs.has_pr == 'true'
        run: |
          cat << 'EOF'
          ╔══════════════════════════════════════════╗
          ║        CRT Job Execution Summary         ║
          ╠══════════════════════════════════════════╣
            PR Number       : #${{ steps.pr_meta.outputs.pr_number }}
            Workflow Run #  : ${{ github.run_number }}
            PR Raiser       : ${{ steps.pr_meta.outputs.pr_author }}
            PR Approver     : ${{ steps.pr_meta.outputs.approver || 'N/A' }}
            Test Build ID   : ${{ steps.crt.outputs.build_id }}
            Test Result     : ${{ steps.crt.outputs.crt_status }}
          ╚══════════════════════════════════════════╝
          EOF

      - name: Post CRT Result to PR
        if: always() && steps.pr_meta.outputs.has_pr == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ steps.crt.outputs.crt_status }}';
            const icon = status === 'passed' ? '✅' : status === 'failed' ? '❌' : '⏳';
            const body = `${icon} **CRT Test Result:** ${status}\n\n**Build ID:** \`${{ steps.crt.outputs.build_id }}\`\n\n[View in CRT Dashboard](https://robotic.copado.com)`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

  # Job 10: Rollback Deployment
  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'rollback'
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli sfdx-git-delta

      - name: Authenticate Org
        env:
          SFDX_AUTH_URL: ${{ secrets[env.SFDX_AUTH_SECRET_NAME] }}
        run: |
          echo "$SFDX_AUTH_URL" > ./auth.url
          sf org login sfdx-url --sfdx-url-file ./auth.url --alias $ORG_ALIAS --no-prompt
          rm ./auth.url

      - name: Build reverse delta
        run: |
          ROLLBACK_SHA="${{ github.event.inputs.rollback_commit_sha }}"
          sgd --to $ROLLBACK_SHA --from HEAD --output rollback --generate-delta-file
          
          # New metadata becomes destructive
          if [ -f rollback/package.xml ]; then
            mv rollback/package.xml rollback/destructiveChanges/destructiveChanges.xml
          fi

      - name: Deploy Rollback
        run: |
          DEPLOY_ID=$(sf project deploy start -d rollback --async --pre-destructive-changes --json | jq -r '.result.id')
          
          until [ "$STATUS" = "Done" ]; do
            sleep 15
            RESULT=$(sf project deploy report -i $DEPLOY_ID --json)
            STATUS=$(echo $RESULT | jq -r '.result.status')
            echo "Rollback status: $STATUS"
          done

      - name: Post Rollback Summary
        uses: actions/github-script@v7
        with:
          script: |
            console.log('✅ Rollback completed to ${{ github.event.inputs.rollback_commit_sha }}');
