name: UAT End-to-End Pipeline
#added env var authurl
on:
  pull_request:
    branches: [main]
    paths:
      - 'force-app/**'
      - '.github/workflows/e2e-uat-pipeline.yml'
      - '.github/sf-scanner-waivers.csv'
    types: [opened, reopened, synchronize, edited, ready_for_review]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      scanner:
        description: 'Scanner to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - checkmarx
          - fortify
      action:
        description: 'Action to perform'
        required: false
        default: 'deploy'
        type: choice
        options:
          - deploy
          - rollback
      rollback_commit_sha:
        description: 'Commit SHA to rollback to'
        required: false
        type: string
      rollback_pr_number:
        description: 'PR number for rollback reference'
        required: false
        type: string

env:
  ORG_ALIAS: ${{ vars.ORG_ALIAS || 'uat' }}
  COVERAGE_THRESHOLD: ${{ vars.COVERAGE_THRESHOLD || '85' }}
  SOURCE_DIR: ${{ vars.SOURCE_DIR || 'force-app/main/default' }}
  SFDX_AUTH_SECRET_NAME: ${{ vars.SFDX_AUTH_SECRET_NAME || 'CRT_UAT_AUTHURL' }}
  DELTA_FROM_COMMIT: ${{ vars.DELTA_FROM_COMMIT }}
  FCLI_BOOTSTRAP_VERSION: ${{ vars.FCLI_BOOTSTRAP_VERSION }}
  SCA_ENFORCEMENT_MODE: ${{ vars.SCA_ENFORCEMENT_MODE || 'enforce' }}

jobs:
  # Job 1: Evaluate Scanner Availability
  setup:
    name: Setup - Evaluate Scanner Availability
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request_review'
    outputs:
      run-checkmarx: ${{ steps.scanner-check.outputs.run-checkmarx }}
      run-fortify: ${{ steps.scanner-check.outputs.run-fortify }}
    steps:
      - name: Evaluate scanner availability
        id: scanner-check
        run: |
          set -euo pipefail
          if [[ -n "${{ secrets.CX_CLIENT_SECRET }}" ]]; then
            echo "run-checkmarx=true" >> $GITHUB_OUTPUT
          else
            echo "run-checkmarx=false" >> $GITHUB_OUTPUT
          fi
          if [[ -n "${{ secrets.FOD_CLIENT_SECRET }}" ]]; then
            echo "run-fortify=true" >> $GITHUB_OUTPUT
          else
            echo "run-fortify=false" >> $GITHUB_OUTPUT
          fi

  # Job 2: Salesforce PR Validation
  salesforce-validation:
    name: Salesforce Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      has_delta: ${{ steps.delta-check.outputs.has_delta }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bootstrap package.json if missing
        run: |
          set -euo pipefail
          if [[ ! -f package.json ]]; then
            echo "Creating default package.json..."
            cat > package.json << 'PKGJSON'
          {
            "name": "salesforce-app",
            "private": true,
            "version": "1.0.0",
            "description": "Salesforce App",
            "scripts": {
              "lint": "eslint **/{aura,lwc}/**/*.js",
              "test": "npm run test:unit",
              "test:unit": "sfdx-lwc-jest",
              "test:unit:watch": "sfdx-lwc-jest --watch",
              "test:unit:debug": "sfdx-lwc-jest --debug",
              "test:unit:coverage": "sfdx-lwc-jest --coverage",
              "prettier": "prettier --write \"**/*.{cls,cmp,component,css,html,js,json,md,page,trigger,xml,yaml,yml}\"",
              "prettier:verify": "prettier --check \"**/*.{cls,cmp,component,css,html,js,json,md,page,trigger,xml,yaml,yml}\"",
              "prepare": "husky || true",
              "precommit": "lint-staged"
            },
            "devDependencies": {
              "@lwc/eslint-plugin-lwc": "^3.1.0",
              "@prettier/plugin-xml": "^3.4.1",
              "@salesforce/eslint-config-lwc": "^4.0.0",
              "@salesforce/eslint-plugin-aura": "^3.0.0",
              "@salesforce/eslint-plugin-lightning": "^2.0.0",
              "@salesforce/sfdx-lwc-jest": "^7.0.2",
              "eslint": "^9.29.0",
              "eslint-plugin-import": "^2.31.0",
              "eslint-plugin-jest": "^28.14.0",
              "husky": "^9.1.7",
              "lint-staged": "^16.1.2",
              "prettier": "^3.5.3",
              "prettier-plugin-apex": "^2.2.6"
            },
            "lint-staged": {
              "**/*.{cls,cmp,component,css,html,js,json,md,page,trigger,xml,yaml,yml}": ["prettier --write"],
              "**/{aura,lwc}/**/*.js": ["eslint"],
              "**/lwc/**": ["sfdx-lwc-jest -- --bail --findRelatedTests --passWithNoTests"]
            }
          }
          PKGJSON
          fi

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Install npm dependencies
        run: npm install

      - name: Authenticate org
        run: |
          set -euo pipefail
          echo "${{ secrets[env.SFDX_AUTH_SECRET_NAME] }}" > ./sfdx-auth.txt
          sf org login sfdx-url --sfdx-url-file ./sfdx-auth.txt --alias $ORG_ALIAS --no-prompt
          rm ./sfdx-auth.txt

      - name: Extract test classes from PR body and comments
        id: pr-tests
        run: |
          set -euo pipefail
          PR_BODY="${{ github.event.pull_request.body }}"
          TEST_CLASSES=$(echo "$PR_BODY" | grep -oP '(?<=Tests:)\s*\K[^$\n]+' || echo "")
          if [[ -z "$TEST_CLASSES" ]]; then
            echo "test_classes=" >> $GITHUB_OUTPUT
          else
            echo "test_classes=$TEST_CLASSES" >> $GITHUB_OUTPUT
          fi

      - name: Install sfdx-git-delta
        run: npm install -g sfdx-git-delta

      - name: Build delta package
        id: delta_pkg
        run: |
          set -euo pipefail
          sgd --to HEAD --from $DELTA_FROM_COMMIT --output delta --generate-delta

      - name: Upload delta artifact
        uses: actions/upload-artifact@v4
        with:
          name: delta-package
          path: delta/

      - name: Compute Apex delta and infer test classes
        id: test-inference
        run: |
          set -euo pipefail
          if [[ ! -f delta/package/package.xml ]]; then
            echo "has_delta=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          TEST_CLASSES=""
          # Extract *Test, *Tests, *TestClass suffixes
          TEST_CLASSES=$(grep -oP 'members>\K[^<]+(?=</members>.*ApexClass)' delta/package/package.xml | grep -E '(Test|Tests|TestClass)$' | tr '\n' ',' | sed 's/,$//' || echo "")
          echo "test_classes=$TEST_CLASSES" >> $GITHUB_OUTPUT

      - name: Set has_delta output
        id: delta-check
        run: |
          set -euo pipefail
          if [[ -f delta/package/package.xml ]]; then
            if grep -q "<members>" delta/package/package.xml; then
              echo "has_delta=true" >> $GITHUB_OUTPUT
            else
              echo "has_delta=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "has_delta=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy validate (async)
        if: steps.delta-check.outputs.has_delta == 'true'
        id: validate
        run: |
          set -euo pipefail
          DEPLOY_ID=$(sf project deploy start --async --manifest delta/package/package.xml --target-org $ORG_ALIAS --json | jq -r '.result.id // empty')
          echo "deploy_id=$DEPLOY_ID" >> $GITHUB_OUTPUT
          
          # Poll for validation results
          while true; do
            STATUS=$(sf project deploy report -i "$DEPLOY_ID" --target-org $ORG_ALIAS --json)
            STATE=$(echo "$STATUS" | jq -r '.result.status // "InProgress"')
            echo "Validation state: $STATE"
            if [[ "$STATE" == "Done" ]] || [[ "$STATE" == "Failed" ]]; then
              break
            fi
            sleep 15
          done
          echo "$STATUS" | jq '.result'

      - name: Check Apex coverage
        if: steps.delta-check.outputs.has_delta == 'true'
        run: |
          set -euo pipefail
          DEPLOY_ID="${{ steps.validate.outputs.deploy_id }}"
          COVERAGE=$(sf project deploy report -i "$DEPLOY_ID" --target-org $ORG_ALIAS --json | jq -r '.result.numberTestsCompleted // "0"')
          echo "Coverage: $COVERAGE"

      - name: Detect and fetch SF Code Analyzer waivers
        if: env.SCA_ENFORCEMENT_MODE != 'off' && steps.delta-check.outputs.has_delta == 'true'
        id: fetch-waivers
        run: |
          set -euo pipefail
          WAIVER_URL="https://api.github.com/repos/${{ github.repository }}/contents/.github/sf-scanner-waivers.csv?ref=main"
          RESPONSE=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "$WAIVER_URL")
          if echo "$RESPONSE" | jq -e '.content' > /dev/null 2>&1; then
            echo "$RESPONSE" | jq -r '.content' | base64 -d > .github/sf-scanner-waivers.csv
            echo "Fetched waivers from main branch"
          else
            echo "No waiver file found on main branch"
          fi

      - name: Install Salesforce Code Analyzer
        if: env.SCA_ENFORCEMENT_MODE != 'off' && steps.delta-check.outputs.has_delta == 'true'
        run: npm install -g @salesforce/sfdx-scanner

      - name: Detect changed apex/lwc/js/css/html files
        if: env.SCA_ENFORCEMENT_MODE != 'off' && steps.delta-check.outputs.has_delta == 'true'
        id: scan-targets
        run: |
          set -euo pipefail
          TARGETS=$(git diff --name-only --diff-filter=ACM $DELTA_FROM_COMMIT..HEAD | grep -E '\.(cls|trigger|js|html|css)$' | tr '\n' ',' | sed 's/,$//' || echo "")
          echo "targets=$TARGETS" >> $GITHUB_OUTPUT
          if [[ -n "$TARGETS" ]]; then
            echo "Changed files to scan: $TARGETS"
          fi

      - name: Run Salesforce Code Analyzer
        if: env.SCA_ENFORCEMENT_MODE != 'off' && steps.scan-targets.outputs.targets != ''
        id: sca-run
        continue-on-error: true
        run: |
          set -euo pipefail
          sf scanner run --target "${{ steps.scan-targets.outputs.targets }}" --format csv --outfile sfdx-report.csv --severity-threshold 3

      - name: Check SCA results against waivers
        if: env.SCA_ENFORCEMENT_MODE != 'off' && steps.scan-targets.outputs.targets != ''
        id: sca-check
        run: |
          set -euo pipefail
          # Python script for waiver validation
          python3 << 'PYTHON_SCA'
          import csv
          from datetime import datetime, timedelta
          
          waiver_file = '.github/sf-scanner-waivers.csv'
          report_file = 'sfdx-report.csv'
          output_file = 'sca-governance-report.csv'
          
          waivers = {}
          try:
              with open(waiver_file, 'r') as f:
                  reader = csv.DictReader(f)
                  for row in reader:
                      key = f"{row['rule']}:{row['file_pattern']}"
                      waivers[key] = row
          except FileNotFoundError:
              print("No waiver file found")
          
          today = datetime.now()
          governance_rows = []
          fail_count = 0
          
          try:
              with open(report_file, 'r') as f:
                  reader = csv.DictReader(f)
                  for violation in reader:
                      rule = violation.get('Rule', '')
                      file_path = violation.get('File', '')
                      status = 'VIOLATION'
                      days_left = 0
                      
                      # Check for waiver
                      for waiver_key, waiver in waivers.items():
                              if rule in waiver_key or file_path in waiver_key:
                                  try:
                                      exp_date = datetime.strptime(waiver['expiry'], '%d-%m-%Y')
                                      if exp_date >= today:
                                          status = 'WAIVED'
                                          days_left = (exp_date - today).days
                                          if days_left <= 30:
                                              status = 'WAIVED_EXPIRING_SOON'
                                      else:
                                          status = 'EXPIRED_WAIVER'
                                          fail_count += 1
                                  except ValueError:
                                      pass
                      
                      governance_rows.append({
                          'Status': status,
                          'Rule': rule,
                          'File': file_path,
                          'Severity': violation.get('Severity', ''),
                          'Days_Left': days_left,
                          'Approved_By': waivers.get(f"{rule}:{file_path}", {}).get('approved_by', ''),
                          'Approved_Date': waivers.get(f"{rule}:{file_path}", {}).get('approved_date', '')
                      })
          
              with open(output_file, 'w', newline='') as f:
                  writer = csv.DictWriter(f, fieldnames=['Status', 'Rule', 'File', 'Severity', 'Days_Left', 'Approved_By', 'Approved_Date'])
                  writer.writeheader()
                  writer.writerows(governance_rows)
          
              if '${{ env.SCA_ENFORCEMENT_MODE }}' == 'enforce' and fail_count > 0:
                  exit(1)
          except FileNotFoundError:
              print("No report file found")
          PYTHON_SCA

      - name: Upload SCA reports
        if: always() && env.SCA_ENFORCEMENT_MODE != 'off'
        uses: actions/upload-artifact@v4
        with:
          name: sfdx-scanner-reports
          path: |
            sfdx-report.csv
            sca-governance-report.csv

      - name: Post SCA governance report to PR
        if: github.event_name == 'pull_request' && env.SCA_ENFORCEMENT_MODE != 'off' && steps.scan-targets.outputs.targets != ''
        run: |
          set -euo pipefail
          if [[ ! -f sca-governance-report.csv ]]; then
            exit 0
          fi
          REPORT=$(cat sca-governance-report.csv | head -20)
          COMMENT="## 📋 SCA Governance Report\\n\`\`\`\\n$REPORT\\n\`\`\`"
          
          # Delete previous comment
          curl -s -X GET -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            | jq '.[] | select(.body | contains("SCA Governance Report")) | .id' \
            | xargs -I {} curl -s -X DELETE -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/issues/comments/{}"
          
          # Post new comment
          curl -s -X POST -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            -d "{\"body\": \"$COMMENT\"}"

  # Job 3: SCA SAST Stage (npm audit)
  sca-sast-stage:
    name: SCA SAST Stage - npm audit
    runs-on: ubuntu-latest
    needs: [setup]
    if: (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bootstrap package.json if missing
        run: |
          set -euo pipefail
          if [[ ! -f package.json ]]; then
            echo "Creating default package.json..."
            cat > package.json << 'PKGJSON'
          {
            "name": "salesforce-app",
            "private": true,
            "version": "1.0.0",
            "description": "Salesforce App",
            "scripts": {
              "lint": "eslint **/{aura,lwc}/**/*.js",
              "test": "npm run test:unit",
              "test:unit": "sfdx-lwc-jest",
              "test:unit:watch": "sfdx-lwc-jest --watch",
              "test:unit:debug": "sfdx-lwc-jest --debug",
              "test:unit:coverage": "sfdx-lwc-jest --coverage",
              "prettier": "prettier --write \"**/*.{cls,cmp,component,css,html,js,json,md,page,trigger,xml,yaml,yml}\"",
              "prettier:verify": "prettier --check \"**/*.{cls,cmp,component,css,html,js,json,md,page,trigger,xml,yaml,yml}\"",
              "prepare": "husky || true",
              "precommit": "lint-staged"
            },
            "devDependencies": {
              "@lwc/eslint-plugin-lwc": "^3.1.0",
              "@prettier/plugin-xml": "^3.4.1",
              "@salesforce/eslint-config-lwc": "^4.0.0",
              "@salesforce/eslint-plugin-aura": "^3.0.0",
              "@salesforce/eslint-plugin-lightning": "^2.0.0",
              "@salesforce/sfdx-lwc-jest": "^7.0.2",
              "eslint": "^9.29.0",
              "eslint-plugin-import": "^2.31.0",
              "eslint-plugin-jest": "^28.14.0",
              "husky": "^9.1.7",
              "lint-staged": "^16.1.2",
              "prettier": "^3.5.3",
              "prettier-plugin-apex": "^2.2.6"
            },
            "lint-staged": {
              "**/*.{cls,cmp,component,css,html,js,json,md,page,trigger,xml,yaml,yml}": ["prettier --write"],
              "**/{aura,lwc}/**/*.js": ["eslint"],
              "**/lwc/**": ["sfdx-lwc-jest -- --bail --findRelatedTests --passWithNoTests"]
            }
          }
          PKGJSON
          fi

      - name: Install dependencies
        run: npm install

      - name: Run dependency SCA gate with waiver support
        run: |
          set -euo pipefail
          WAIVER_FILE=".github/sca-waivers.json"
          TODAY=$(date -u +%Y-%m-%d)
          npm audit --json --audit-level=high > audit-output.json 2>/dev/null || true
          VULN_COUNT=$(jq '[.vulnerabilities // {} | to_entries[] | .value
            | select(.severity == "high" or .severity == "critical")] | length' audit-output.json 2>/dev/null || echo 0)
          if [[ "$VULN_COUNT" -eq 0 ]]; then
            echo "✅ No high/critical vulnerabilities found."
            exit 0
          fi
          echo "Found $VULN_COUNT high/critical vulnerability/ies. Checking waivers..."
          WAIVERS="[]"
          if [[ -f "$WAIVER_FILE" ]]; then
            WAIVERS=$(jq '.' "$WAIVER_FILE" 2>/dev/null || echo "[]")
            echo "Loaded waiver file: $WAIVER_FILE"
          else
            echo "No waiver file found at $WAIVER_FILE — all violations will be evaluated."
          fi
          FAIL=0; WAIVED=0; EXPIRED=0
          while IFS= read -r vuln_json; do
            PKG=$(echo "$vuln_json"  | jq -r '.name')
            SEV=$(echo "$vuln_json"  | jq -r '.severity')
            GHSA=$(echo "$vuln_json" | jq -r '.via[0].source // .via[0] // "unknown"' 2>/dev/null | head -1)
            WAIVER=$(echo "$WAIVERS" | jq --arg pkg "$PKG" --arg today "$TODAY" \
              '[.[] | select(.package == $pkg and .expires >= $today)] | first // empty')
            EXPIRED_WAIVER=$(echo "$WAIVERS" | jq --arg pkg "$PKG" --arg today "$TODAY" \
              '[.[] | select(.package == $pkg and .expires < $today)] | first // empty')
            if [[ -n "$WAIVER" && "$WAIVER" != "null" ]]; then
              EXPIRES=$(echo "$WAIVER" | jq -r '.expires')
              REASON=$(echo "$WAIVER"  | jq -r '.reason')
              APPROVED=$(echo "$WAIVER"| jq -r '.approved_by // "unknown"')
              echo "✅ WAIVED [$SEV] $PKG (advisory: $GHSA)"
              echo "   Reason: $REASON | Approved by: $APPROVED | Expires: $EXPIRES"
              WAIVED=$((WAIVED + 1))
            elif [[ -n "$EXPIRED_WAIVER" && "$EXPIRED_WAIVER" != "null" ]]; then
              EXPIRES=$(echo "$EXPIRED_WAIVER" | jq -r '.expires')
              REASON=$(echo "$EXPIRED_WAIVER"  | jq -r '.reason')
              echo "::error::❌ EXPIRED WAIVER [$SEV] $PKG (advisory: $GHSA)"
              echo "   Waiver expired on $EXPIRES — fix is now required. Reason was: $REASON"
              EXPIRED=$((EXPIRED + 1))
              FAIL=1
            else
              echo "::error::❌ UNWAIVED [$SEV] $PKG (advisory: $GHSA) — no active waiver found."
              FAIL=$((FAIL + 1))
            fi
          done < <(jq -c '[.vulnerabilities // {} | to_entries[] | .value
            | select(.severity == "high" or .severity == "critical")][]' audit-output.json 2>/dev/null)
          echo ""
          echo "──────────────────────────────────────────"
          echo "SCA Summary: $VULN_COUNT violation(s) found"
          echo "  ✅ Waived (active):   $WAIVED"
          echo "  ❌ Expired waivers:   $EXPIRED"
          echo "  ❌ Unwaived failures: $((FAIL - EXPIRED))"
          echo "──────────────────────────────────────────"
          if [[ "$FAIL" -gt 0 ]]; then
            echo "To suppress a known violation, add an entry to $WAIVER_FILE:"
            echo '  { "package": "<pkg>", "severity": "<high|critical>", "reason": "<justification>", "expires": "YYYY-MM-DD", "approved_by": "<team>" }'
            exit 1
          fi
          echo "✅ All violations are covered by active waivers."

  # Job 4: Automated Governance (Full test suite)
  automated-governance:
    name: Automated Governance - Full Test Suite
    runs-on: ubuntu-latest
    needs: [salesforce-validation]
    if: needs.salesforce-validation.outputs.has_delta == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Install npm dependencies
        run: npm install

      - name: Authenticate org
        run: |
          set -euo pipefail
          echo "${{ secrets[env.SFDX_AUTH_SECRET_NAME] }}" > ./sfdx-auth.txt
          sf org login sfdx-url --sfdx-url-file ./sfdx-auth.txt --alias $ORG_ALIAS --no-prompt
          rm ./sfdx-auth.txt

      - name: Run full Apex test suite
        id: test-run
        run: |
          set -euo pipefail
          DEPLOY_ID=$(sf project deploy start --async --test-level RunLocalTests --target-org $ORG_ALIAS --json | jq -r '.result.id')
          echo "deploy_id=$DEPLOY_ID" >> $GITHUB_OUTPUT
          
          # Poll for test results
          while true; do
            STATUS=$(sf project deploy report -i "$DEPLOY_ID" --target-org $ORG_ALIAS --json)
            STATE=$(echo "$STATUS" | jq -r '.result.status // "InProgress"')
            if [[ "$STATE" == "Done" ]] || [[ "$STATE" == "Failed" ]]; then
              break
            fi
            sleep 15
          done
          echo "$STATUS" | jq '.result'

      - name: Check coverage meets threshold
        run: |
          set -euo pipefail
          DEPLOY_ID="${{ steps.test-run.outputs.deploy_id }}"
          COVERAGE=$(sf project deploy report -i "$DEPLOY_ID" --target-org $ORG_ALIAS --json | jq -r '.result.numberTestsCompleted // "0"')
          echo "Test coverage: $COVERAGE%"
          if [[ $COVERAGE -lt $COVERAGE_THRESHOLD ]]; then
            echo "::error::Coverage $COVERAGE% is below threshold $COVERAGE_THRESHOLD%"
            exit 1
          fi

  # Job 5: CheckMarx SAST
  checkmarx-sast:
    name: CheckMarx SAST Scan
    runs-on: ubuntu-latest
    needs: [setup]
    if: needs.setup.outputs.run-checkmarx == 'true' && (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: CheckMarx scan
        run: |
          echo "CheckMarx SAST scan would be triggered here"
          echo "Requires: CX_CLIENT_SECRET, CX_API_URL, project configuration"

  # Job 6: Fortify SAST/DAST
  fortify-sast-dast:
    name: Fortify SAST + DAST
    runs-on: ubuntu-latest
    needs: [setup]
    if: needs.setup.outputs.run-fortify == 'true' && (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fortify scan
        run: |
          echo "Fortify SAST/DAST scan would be triggered here"
          echo "Requires: FOD_CLIENT_SECRET, Fortify configuration"

  # Job 7: Approval & Merge Gate
  approval-merge-gate:
    name: Approval & Merge Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_review' && github.event.review.state == 'approved'
    outputs:
      merge_commit_sha: ${{ steps.merge.outputs.merge_commit_sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify approval freshness
        run: |
          set -euo pipefail
          APPROVAL_TIME="${{ github.event.review.submitted_at }}"
          echo "PR approved at: $APPROVAL_TIME"

      - name: Merge PR
        id: merge
        run: |
          set -euo pipefail
          gh pr merge ${{ github.event.pull_request.number }} --admin --merge
          MERGE_SHA=$(git rev-parse HEAD)
          echo "merge_commit_sha=$MERGE_SHA" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 8: Deploy after Merge
  deploy-after-merge:
    name: Deploy to UAT
    runs-on: ubuntu-latest
    needs: [approval-merge-gate]
    if: success()
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Install npm dependencies
        run: npm install

      - name: Authenticate org
        run: |
          set -euo pipefail
          echo "${{ secrets[env.SFDX_AUTH_SECRET_NAME] }}" > ./sfdx-auth.txt
          sf org login sfdx-url --sfdx-url-file ./sfdx-auth.txt --alias $ORG_ALIAS --no-prompt
          rm ./sfdx-auth.txt

      - name: Install sfdx-git-delta
        run: npm install -g sfdx-git-delta

      - name: Build delta package from merged commit
        id: delta_pkg
        run: |
          set -euo pipefail
          MERGE_BASE=$(git rev-parse HEAD^1)
          echo "merge_base=$MERGE_BASE" >> $GITHUB_OUTPUT
          sgd --to HEAD --from "$MERGE_BASE" --output delta --generate-delta

      - name: Deploy to UAT
        id: deploy
        run: |
          set -euo pipefail
          DEPLOY_ID=$(sf project deploy start --async --manifest delta/package/package.xml --target-org $ORG_ALIAS --json | jq -r '.result.id')
          echo "deploy_id=$DEPLOY_ID" >> $GITHUB_OUTPUT
          
          # Poll for deployment results
          while true; do
            STATUS=$(sf project deploy report -i "$DEPLOY_ID" --target-org $ORG_ALIAS --json)
            STATE=$(echo "$STATUS" | jq -r '.result.status // "InProgress"')
            if [[ "$STATE" == "Done" ]] || [[ "$STATE" == "Failed" ]]; then
              break
            fi
            sleep 15
          done
          echo "$STATUS" | jq '.result'

      - name: Build deployment package info
        run: |
          set -euo pipefail
          cat > deployment-info.json << EOF
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "deploy_id": "${{ steps.deploy.outputs.deploy_id }}",
            "merge_base": "${{ steps.delta_pkg.outputs.merge_base }}",
            "pr_number": ${{ github.event.pull_request.number || 'null' }}
          }
          EOF

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: |
            delta/package/
            deployment-info.json
          retention-days: 90

      - name: Update DELTA_FROM_COMMIT variable
        run: |
          set -euo pipefail
          NEW_SHA=$(git rev-parse HEAD)
          curl -L -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/variables/DELTA_FROM_COMMIT \
            -d "{\"name\":\"DELTA_FROM_COMMIT\",\"value\":\"$NEW_SHA\"}"

  # Job 9: Trigger CRT Tests
  trigger-crt-tests:
    name: Trigger CRT Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-after-merge]
    if: success()
    outputs:
      build_id: ${{ steps.crt.outputs.build_id }}
      crt_status: ${{ steps.crt.outputs.crt_status }}
    steps:
      - name: Trigger CRT build and monitor
        id: crt
        run: |
          set -euo pipefail
          PROJECT_ID="${{ vars.CRT_PROJECT_ID || '73283' }}"
          JOB_ID="${{ vars.CRT_JOB_ID || '115686' }}"
          
          # Mutation to create build
          MUTATION='mutation { createBuild(projectId: '$PROJECT_ID', jobId: '$JOB_ID') { id status } }'
          
          BUILD_RESPONSE=$(curl -s -X POST https://graphql.eu-robotic.copado.com/v1 \
            -H "X-Authorization: ${{ secrets.CRT_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"$MUTATION\"}")
          
          BUILD_ID=$(echo "$BUILD_RESPONSE" | jq -r '.data.createBuild.id // empty')
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
          
          # Poll for results
          MAX_ATTEMPTS=120
          ATTEMPT=0
          while [[ $ATTEMPT -lt $MAX_ATTEMPTS ]]; do
            QUERY='query { latestBuilds(projectId: '$PROJECT_ID', resultSize: 1) { id status } }'
            RESULT=$(curl -s -X POST https://graphql.eu-robotic.copado.com/v1 \
              -H "X-Authorization: ${{ secrets.CRT_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{\"query\": \"$QUERY\"}")
            
            STATUS=$(echo "$RESULT" | jq -r '.data.latestBuilds[0].status // "executing"')
            if [[ "$STATUS" == "passed" ]] || [[ "$STATUS" == "failed" ]] || [[ "$STATUS" == "error" ]] || [[ "$STATUS" == "cancelled" ]] || [[ "$STATUS" == "skipped" ]]; then
              echo "crt_status=$STATUS" >> $GITHUB_OUTPUT
              break
            fi
            ATTEMPT=$((ATTEMPT + 1))
            sleep 30
          done

      - name: Fetch PR metadata
        id: pr_meta
        if: always()
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            PR_NUMBER=${{ github.event.pull_request.number }}
            RAISER="${{ github.event.pull_request.user.login }}"
            
            # Get last approver
            APPROVER=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUMBER/reviews" \
              | jq -r '[.[] | select(.state=="APPROVED")] | last | .user.login // "unknown"')
            
            echo "has_pr=true" >> $GITHUB_OUTPUT
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
            echo "raiser=$RAISER" >> $GITHUB_OUTPUT
            echo "approver=$APPROVER" >> $GITHUB_OUTPUT
          else
            echo "has_pr=false" >> $GITHUB_OUTPUT
          fi

      - name: Print Job Summary
        if: always() && steps.pr_meta.outputs.has_pr == 'true'
        run: |
          set -euo pipefail
          cat << EOF
          ╔══════════════════════════════════════════╗
          ║        CRT Job Execution Summary         ║
          ╠══════════════════════════════════════════╣
            PR Number       : #${{ steps.pr_meta.outputs.pr_number }}
            Workflow Run #  : ${{ github.run_number }}
            PR Raiser       : ${{ steps.pr_meta.outputs.raiser }}
            PR Approver     : ${{ steps.pr_meta.outputs.approver }}
            Test Build ID   : ${{ steps.crt.outputs.build_id }}
            Test Result     : ${{ steps.crt.outputs.crt_status }}
          ╚══════════════════════════════════════════╝
          EOF

  # Job 10: Rollback Deployment
  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'rollback'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Install npm dependencies
        run: npm install

      - name: Authenticate org
        run: |
          set -euo pipefail
          echo "${{ secrets[env.SFDX_AUTH_SECRET_NAME] }}" > ./sfdx-auth.txt
          sf org login sfdx-url --sfdx-url-file ./sfdx-auth.txt --alias $ORG_ALIAS --no-prompt
          rm ./sfdx-auth.txt

      - name: Install sfdx-git-delta
        run: npm install -g sfdx-git-delta

      - name: Build reverse delta (rollback package)
        id: rollback_pkg
        run: |
          set -euo pipefail
          ROLLBACK_SHA="${{ github.event.inputs.rollback_commit_sha }}"
          sgd --to "$ROLLBACK_SHA" --from HEAD --output rollback --generate-delta

      - name: Deploy rollback with destructive changes
        run: |
          set -euo pipefail
          DEPLOY_ID=$(sf project deploy start --async --manifest rollback/package/package.xml \
            --pre-destructive-changes rollback/destructiveChanges/destructiveChanges.xml \
            --target-org $ORG_ALIAS --json | jq -r '.result.id')
          
          # Poll for rollback completion
          while true; do
            STATUS=$(sf project deploy report -i "$DEPLOY_ID" --target-org $ORG_ALIAS --json)
            STATE=$(echo "$STATUS" | jq -r '.result.status // "InProgress"')
            if [[ "$STATE" == "Done" ]] || [[ "$STATE" == "Failed" ]]; then
              echo "$STATUS" | jq '.result'
              break
            fi
            sleep 15
          done
