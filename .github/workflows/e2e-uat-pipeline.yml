name: UAT End-to-End Pipeline

on:
  pull_request:
    branches: [uat]
    paths:
      - 'force-app/**'
      - '.github/workflows/e2e-uat-pipeline.yml'
      - '.github/sf-scanner-waivers.csv'
    types: [opened, reopened, synchronize, edited, ready_for_review]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      scanner:
        description: 'Scanner type'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - checkmarx
          - fortify
      action:
        description: 'Deployment action'
        required: false
        default: 'deploy'
        type: choice
        options:
          - deploy
          - rollback
      rollback_commit_sha:
        description: 'Commit SHA to rollback to'
        required: false
        type: string
      rollback_pr_number:
        description: 'PR number for rollback reference'
        required: false
        type: string

env:
  ORG_ALIAS: ${{ vars.ORG_ALIAS || 'uat' }}
  COVERAGE_THRESHOLD: ${{ vars.COVERAGE_THRESHOLD || 85 }}
  SOURCE_DIR: ${{ vars.SOURCE_DIR || 'force-app/main/default' }}
  SFDX_AUTH_SECRET_NAME: ${{ vars.SFDX_AUTH_SECRET_NAME || 'CRT_UAT_AUTHURL' }}
  DELTA_FROM_COMMIT: ${{ vars.DELTA_FROM_COMMIT }}
  FCLI_BOOTSTRAP_VERSION: ${{ vars.FCLI_BOOTSTRAP_VERSION }}
  SCA_ENFORCEMENT_MODE: ${{ vars.SCA_ENFORCEMENT_MODE || 'enforce' }}
  CRT_JOB_ID: ${{ vars.CRT_JOB_ID || '115686' }}
  CRT_PROJECT_ID: ${{ vars.CRT_PROJECT_ID || '73283' }}
  CRT_ORG_ID: ${{ vars.CRT_ORG_ID || '43532' }}

jobs:
  setup:
    name: Evaluate Scanner Availability
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request_review'
    outputs:
      run-checkmarx: ${{ steps.scanner-check.outputs.run-checkmarx }}
      run-fortify: ${{ steps.scanner-check.outputs.run-fortify }}
    steps:
      - name: Check for scanner secrets
        id: scanner-check
        run: |
          if [[ -n "${{ secrets.CX_CLIENT_SECRET }}" ]]; then
            echo "run-checkmarx=true" >> $GITHUB_OUTPUT
          else
            echo "run-checkmarx=false" >> $GITHUB_OUTPUT
          fi
          
          if [[ -n "${{ secrets.FOD_CLIENT_SECRET }}" ]]; then
            echo "run-fortify=true" >> $GITHUB_OUTPUT
          else
            echo "run-fortify=false" >> $GITHUB_OUTPUT
          fi

  salesforce-validation:
    name: Salesforce PR Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      has_delta: ${{ steps.delta-check.outputs.has_delta }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bootstrap package.json if missing
        run: |
          set -euo pipefail
          if [[ ! -f package.json ]]; then
            echo "Creating standard package.json..."
            cat > package.json << 'PKGJSON'
          {
            "name": "salesforce-app",
            "private": true,
            "version": "1.0.0",
            "description": "Salesforce App",
            "scripts": {
              "lint": "eslint **/{aura,lwc}/**/*.js",
              "test": "npm run test:unit",
              "test:unit": "sfdx-lwc-jest",
              "test:unit:watch": "sfdx-lwc-jest --watch",
              "test:unit:debug": "sfdx-lwc-jest --debug",
              "test:unit:coverage": "sfdx-lwc-jest --coverage",
              "prettier": "prettier --write \"**/*.{cls,cmp,component,css,html,js,json,md,page,trigger,xml,yaml,yml}\"",
              "prettier:verify": "prettier --check \"**/*.{cls,cmp,component,css,html,js,json,md,page,trigger,xml,yaml,yml}\"",
              "prepare": "husky || true",
              "precommit": "lint-staged"
            },
            "devDependencies": {
              "@lwc/eslint-plugin-lwc": "^3.1.0",
              "@prettier/plugin-xml": "^3.4.1",
              "@salesforce/eslint-config-lwc": "^4.0.0",
              "@salesforce/eslint-plugin-aura": "^3.0.0",
              "@salesforce/eslint-plugin-lightning": "^2.0.0",
              "@salesforce/sfdx-lwc-jest": "^7.0.2",
              "eslint": "^9.29.0",
              "eslint-plugin-import": "^2.31.0",
              "eslint-plugin-jest": "^28.14.0",
              "husky": "^9.1.7",
              "lint-staged": "^16.1.2",
              "prettier": "^3.5.3",
              "prettier-plugin-apex": "^2.2.6"
            },
            "lint-staged": {
              "**/*.{cls,cmp,component,css,html,js,json,md,page,trigger,xml,yaml,yml}": ["prettier --write"],
              "**/{aura,lwc}/**/*.js": ["eslint"],
              "**/lwc/**": ["sfdx-lwc-jest -- --bail --findRelatedTests --passWithNoTests"]
            }
          }
          PKGJSON
          fi

      - name: Install npm dependencies
        run: npm install

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate to org
        run: |
          echo "${{ secrets[env.SFDX_AUTH_SECRET_NAME] }}" > auth.sfdx-url
          sf org login sfdx-url --sfdx-url-file auth.sfdx-url --alias ${{ env.ORG_ALIAS }} --set-default
          rm auth.sfdx-url

      - name: Build delta package
        id: delta-build
        run: |
          set -euo pipefail
          npm install sfdx-git-delta
          FROM_COMMIT="${{ env.DELTA_FROM_COMMIT }}"
          if [[ -z "$FROM_COMMIT" ]]; then
            FROM_COMMIT=$(git log --oneline -1 uat | awk '{print $1}')
          fi
          echo "Calculating delta from: $FROM_COMMIT"
          npx sfdx-git-delta --from $FROM_COMMIT --to HEAD --output delta_package
          echo "delta_base=$FROM_COMMIT" >> $GITHUB_OUTPUT

      - name: Upload delta artifact
        uses: actions/upload-artifact@v4
        with:
          name: delta-package
          path: delta_package/

      - name: Check for delta changes
        id: delta-check
        run: |
          if [[ -f delta_package/package.xml ]]; then
            MEMBER_COUNT=$(grep -c "<members>" delta_package/package.xml || echo 0)
            if [[ $MEMBER_COUNT -gt 0 ]]; then
              echo "has_delta=true" >> $GITHUB_OUTPUT
            else
              echo "has_delta=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "has_delta=false" >> $GITHUB_OUTPUT
          fi

      - name: Validate delta deployment
        if: steps.delta-check.outputs.has_delta == 'true'
        run: |
          set -euo pipefail
          sf project deploy validate \
            --source-dir delta_package \
            --async \
            --test-level RunLocalTests \
            --verbose

      - name: Check Apex test coverage
        if: steps.delta-check.outputs.has_delta == 'true'
        run: |
          set -euo pipefail
          COVERAGE=$(sf apex test run --code-coverage-only --wait 60 --json 2>/dev/null | jq '.result.coverage.totalCoverage' || echo "0")
          THRESHOLD=${{ env.COVERAGE_THRESHOLD }}
          echo "Apex Coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
            echo "❌ Coverage $COVERAGE% is below threshold $THRESHOLD%"
            exit 1
          fi

      - name: Setup SCA tools
        if: steps.delta-check.outputs.has_delta == 'true' && env.SCA_ENFORCEMENT_MODE != 'off'
        run: |
          npm install -g @salesforce/sfdx-scanner

      - name: Detect waiver file tampering
        if: steps.delta-check.outputs.has_delta == 'true' && env.SCA_ENFORCEMENT_MODE != 'off'
        run: |
          if git diff --name-only HEAD~1 | grep -q ".github/sf-scanner-waivers.csv"; then
            echo "⚠️  WARNING: .github/sf-scanner-waivers.csv was modified in this PR."
            echo "    Waivers are always read from the main branch. PR modifications are ignored."
          fi

      - name: Fetch SCA waivers from main
        if: steps.delta-check.outputs.has_delta == 'true' && env.SCA_ENFORCEMENT_MODE != 'off'
        id: fetch-waivers
        run: |
          set -euo pipefail
          WAIVER_FILE=".github/sf-scanner-waivers.csv"
          BRANCH="${{ github.base_ref }}"
          if [[ -z "$BRANCH" ]]; then
            BRANCH="main"
          fi
          
          if git ls-remote --heads origin $BRANCH | grep -q "refs/heads/$BRANCH"; then
            git show origin/$BRANCH:$WAIVER_FILE > fetched-waivers.csv 2>/dev/null || {
              echo "⚠️  No waiver file found on $BRANCH branch"
              echo "rule,file_pattern,message_contains,severity_threshold,expiry,reason,approved_by,approved_date,ticket,status" > fetched-waivers.csv
            }
          else
            echo "⚠️  Branch $BRANCH not found, creating empty waiver file"
            echo "rule,file_pattern,message_contains,severity_threshold,expiry,reason,approved_by,approved_date,ticket,status" > fetched-waivers.csv
          fi

      - name: Run Salesforce Code Analyzer
        if: steps.delta-check.outputs.has_delta == 'true' && env.SCA_ENFORCEMENT_MODE != 'off'
        id: sca-scan
        continue-on-error: true
        run: |
          set -euo pipefail
          CHANGED_FILES=$(git diff --name-only HEAD~1 | grep -E "\.(cls|trigger|js|html|css)$" || echo "")
          if [[ -z "$CHANGED_FILES" ]]; then
            echo "No code files changed, skipping scan"
            touch sfdx-report.csv
            exit 0
          fi
          
          echo "$CHANGED_FILES" | xargs sf scanner run \
            --format csv \
            --outfile sfdx-report.csv \
            --severity-threshold 3 || true

      - name: Check SCA results against waivers
        if: steps.delta-check.outputs.has_delta == 'true' && env.SCA_ENFORCEMENT_MODE != 'off'
        run: |
          set -euo pipefail
          if [[ ! -f sfdx-report.csv ]] || [[ ! -s sfdx-report.csv ]]; then
            echo "✅ No SCA violations found"
            exit 0
          fi
          
          # Python script to parse CSV and check waivers
          python3 << 'PYTHON_EOF'
          import csv
          import datetime
          import sys
          
          violations = []
          try:
              with open('sfdx-report.csv', 'r') as f:
                  reader = csv.DictReader(f)
                  violations = list(reader)
          except:
              print("✅ No violations to check")
              sys.exit(0)
          
          waivers = []
          try:
              with open('fetched-waivers.csv', 'r') as f:
                  reader = csv.DictReader(f)
                  waivers = list(reader)
          except:
              pass
          
          def parse_date(date_str):
              for fmt in ['%d-%m-%Y', '%d/%m/%Y', '%Y-%m-%d']:
                  try:
                      return datetime.datetime.strptime(date_str, fmt).date()
                  except:
                      pass
              return None
          
          today = datetime.date.today()
          failed = False
          
          with open('sca-governance-report.csv', 'w', newline='') as f:
              writer = csv.writer(f)
              writer.writerow(['Status', 'Rule', 'File', 'Line', 'Severity', 'Description', 'Expiry', 'Days_Left', 'Reason', 'Approved_By', 'Approved_Date', 'Ticket'])
              
              for viol in violations:
                  rule = viol.get('Rule', '')
                  file = viol.get('File', '')
                  found_waiver = False
                  
                  for waiver in waivers:
                      w_rule = waiver.get('rule', '')
                      w_file = waiver.get('file_pattern', '')
                      w_status = waiver.get('status', '')
                      
                      if w_status == 'REVOKED':
                          continue
                      
                      rule_match = (w_rule == '*' or w_rule == '' or w_rule.lower() in rule.lower())
                      file_match = (w_file == '*' or w_file == '' or w_file.lower() in file.lower())
                      
                      if rule_match and file_match:
                          expiry_str = waiver.get('expiry', '')
                          expiry = parse_date(expiry_str)
                          days_left = (expiry - today).days if expiry else -1
                          
                          if expiry and expiry >= today:
                              status = 'WAIVED' if days_left > 30 else 'WAIVED_EXPIRING_SOON'
                              print(f"{'✅' if days_left > 30 else '⏰'} {status}: {rule} in {file} (Expires: {expiry_str}, {days_left}d left)")
                          else:
                              status = 'EXPIRED_WAIVER'
                              print(f"❌ {status}: {rule} in {file} (Expired on {expiry_str})")
                              failed = True
                          
                          writer.writerow([status, rule, file, viol.get('Line', ''), viol.get('Severity', ''), viol.get('Description', ''), expiry_str, days_left, waiver.get('reason', ''), waiver.get('approved_by', ''), waiver.get('approved_date', ''), waiver.get('ticket', '')])
                          found_waiver = True
                          break
                  
                  if not found_waiver:
                      print(f"⚠️  VIOLATION: {rule} in {file} (no waiver found)")
                      writer.writerow(['VIOLATION', rule, file, viol.get('Line', ''), viol.get('Severity', ''), viol.get('Description', ''), '', '', 'No waiver', '', '', ''])
          
          if failed and "${{ env.SCA_ENFORCEMENT_MODE }}" == "enforce":
              print("\n❌ SCA check failed due to expired waivers")
              sys.exit(1)
          PYTHON_EOF

      - name: Post SCA governance report
        if: steps.delta-check.outputs.has_delta == 'true' && github.event_name == 'pull_request' && env.SCA_ENFORCEMENT_MODE != 'off'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('sca-governance-report.csv')) {
              return;
            }
            
            const report = fs.readFileSync('sca-governance-report.csv', 'utf8');
            const comment = `## 📊 SCA Governance Report\n\n\`\`\`csv\n${report}\n\`\`\``;
            
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            const botComment = comments.find(c => c.user.type === 'Bot' && c.body.includes('SCA Governance Report'));
            if (botComment) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id
              });
            }
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });

      - name: Upload SCA reports artifact
        if: steps.delta-check.outputs.has_delta == 'true' && env.SCA_ENFORCEMENT_MODE != 'off'
        uses: actions/upload-artifact@v4
        with:
          name: sfdx-scanner-reports
          path: |
            sfdx-report.csv
            sca-governance-report.csv
            fetched-waivers.csv

  sca-sast-stage:
    name: SCA/SAST Stage (npm audit)
    runs-on: ubuntu-latest
    needs: [setup]
    if: (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch') && vars.SCA_ENFORCEMENT_MODE != 'off'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bootstrap package.json if missing
        run: |
          set -euo pipefail
          if [[ ! -f package.json ]]; then
            echo "Creating standard package.json..."
            cat > package.json << 'PKGJSON'
          {
            "name": "salesforce-app",
            "private": true,
            "version": "1.0.0",
            "description": "Salesforce App",
            "scripts": {
              "lint": "eslint **/{aura,lwc}/**/*.js",
              "test": "npm run test:unit",
              "test:unit": "sfdx-lwc-jest",
              "test:unit:watch": "sfdx-lwc-jest --watch",
              "test:unit:debug": "sfdx-lwc-jest --debug",
              "test:unit:coverage": "sfdx-lwc-jest --coverage",
              "prettier": "prettier --write \"**/*.{cls,cmp,component,css,html,js,json,md,page,trigger,xml,yaml,yml}\"",
              "prettier:verify": "prettier --check \"**/*.{cls,cmp,component,css,html,js,json,md,page,trigger,xml,yaml,yml}\"",
              "prepare": "husky || true",
              "precommit": "lint-staged"
            },
            "devDependencies": {
              "@lwc/eslint-plugin-lwc": "^3.1.0",
              "@prettier/plugin-xml": "^3.4.1",
              "@salesforce/eslint-config-lwc": "^4.0.0",
              "@salesforce/eslint-plugin-aura": "^3.0.0",
              "@salesforce/eslint-plugin-lightning": "^2.0.0",
              "@salesforce/sfdx-lwc-jest": "^7.0.2",
              "eslint": "^9.29.0",
              "eslint-plugin-import": "^2.31.0",
              "eslint-plugin-jest": "^28.14.0",
              "husky": "^9.1.7",
              "lint-staged": "^16.1.2",
              "prettier": "^3.5.3",
              "prettier-plugin-apex": "^2.2.6"
            },
            "lint-staged": {
              "**/*.{cls,cmp,component,css,html,js,json,md,page,trigger,xml,yaml,yml}": ["prettier --write"],
              "**/{aura,lwc}/**/*.js": ["eslint"],
              "**/lwc/**": ["sfdx-lwc-jest -- --bail --findRelatedTests --passWithNoTests"]
            }
          }
          PKGJSON
          fi

      - name: Run dependency SCA gate with waiver support
        run: |
          set -euo pipefail
          WAIVER_FILE=".github/sca-waivers.json"
          TODAY=$(date -u +%Y-%m-%d)
          npm audit --json --audit-level=high > audit-output.json 2>/dev/null || true
          VULN_COUNT=$(jq '[.vulnerabilities // {} | to_entries[] | .value
            | select(.severity == "high" or .severity == "critical")] | length' audit-output.json 2>/dev/null || echo 0)
          if [[ "$VULN_COUNT" -eq 0 ]]; then
            echo "✅ No high/critical vulnerabilities found."
            exit 0
          fi
          echo "Found $VULN_COUNT high/critical vulnerability/ies. Checking waivers..."
          WAIVERS="[]"
          if [[ -f "$WAIVER_FILE" ]]; then
            WAIVERS=$(jq '.' "$WAIVER_FILE" 2>/dev/null || echo "[]")
            echo "Loaded waiver file: $WAIVER_FILE"
          else
            echo "No waiver file found at $WAIVER_FILE — all violations will be evaluated."
          fi
          FAIL=0; WAIVED=0; EXPIRED=0
          while IFS= read -r vuln_json; do
            PKG=$(echo "$vuln_json"  | jq -r '.name')
            SEV=$(echo "$vuln_json"  | jq -r '.severity')
            GHSA=$(echo "$vuln_json" | jq -r '.via[0].source // .via[0] // "unknown"' 2>/dev/null | head -1)
            WAIVER=$(echo "$WAIVERS" | jq --arg pkg "$PKG" --arg today "$TODAY" \
              '[.[] | select(.package == $pkg and .expires >= $today)] | first // empty')
            EXPIRED_WAIVER=$(echo "$WAIVERS" | jq --arg pkg "$PKG" --arg today "$TODAY" \
              '[.[] | select(.package == $pkg and .expires < $today)] | first // empty')
            if [[ -n "$WAIVER" && "$WAIVER" != "null" ]]; then
              EXPIRES=$(echo "$WAIVER" | jq -r '.expires')
              REASON=$(echo "$WAIVER"  | jq -r '.reason')
              APPROVED=$(echo "$WAIVER"| jq -r '.approved_by // "unknown"')
              echo "⏳ WAIVED [$SEV] $PKG (advisory: $GHSA)"
              echo "   Reason: $REASON | Approved by: $APPROVED | Expires: $EXPIRES"
              WAIVED=$((WAIVED + 1))
            elif [[ -n "$EXPIRED_WAIVER" && "$EXPIRED_WAIVER" != "null" ]]; then
              EXPIRES=$(echo "$EXPIRED_WAIVER" | jq -r '.expires')
              REASON=$(echo "$EXPIRED_WAIVER"  | jq -r '.reason')
              echo "::error::❌ EXPIRED WAIVER [$SEV] $PKG (advisory: $GHSA)"
              echo "   Waiver expired on $EXPIRES — fix is now required. Reason was: $REASON"
              EXPIRED=$((EXPIRED + 1))
              FAIL=1
            else
              echo "::error::❌ UNWAIVED [$SEV] $PKG (advisory: $GHSA) — no active waiver found."
              FAIL=$((FAIL + 1))
            fi
          done < <(jq -c '[.vulnerabilities // {} | to_entries[] | .value
            | select(.severity == "high" or .severity == "critical")][]' audit-output.json 2>/dev/null)
          echo ""
          echo "──────────────────────────────────────────"
          echo "SCA Summary: $VULN_COUNT violation(s) found"
          echo "  ✅ Waived (active):   $WAIVED"
          echo "  ❌ Expired waivers:   $EXPIRED"
          echo "  ❌ Unwaived failures: $((FAIL - EXPIRED))"
          echo "──────────────────────────────────────────"
          if [[ "$FAIL" -gt 0 ]]; then
            if [[ "${{ vars.SCA_ENFORCEMENT_MODE }}" == "warn" ]]; then
              echo "⚠️  SCA issues detected but running in WARN mode — not failing"
              exit 0
            fi
            echo "To suppress a known violation, add an entry to $WAIVER_FILE:"
            echo '  { "package": "<pkg>", "severity": "<high|critical>", "reason": "<justification>", "expires": "YYYY-MM-DD", "approved_by": "<team>" }'
            exit 1
          fi
          echo "✅ All violations are covered by active waivers."

  automated-governance:
    name: Automated Hard Gates
    runs-on: ubuntu-latest
    needs: [salesforce-validation]
    if: needs.salesforce-validation.outputs.has_delta == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download delta package
        uses: actions/download-artifact@v4
        with:
          name: delta-package
          path: delta_package/

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate to org
        run: |
          echo "${{ secrets[env.SFDX_AUTH_SECRET_NAME] }}" > auth.sfdx-url
          sf org login sfdx-url --sfdx-url-file auth.sfdx-url --alias ${{ env.ORG_ALIAS }} --set-default
          rm auth.sfdx-url

      - name: Run full Apex test suite
        run: |
          sf apex test run --wait 60

      - name: Verify Apex coverage
        run: |
          COVERAGE=$(sf apex test run --code-coverage-only --wait 60 --json 2>/dev/null | jq '.result.coverage.totalCoverage' || echo "0")
          THRESHOLD=${{ env.COVERAGE_THRESHOLD }}
          echo "Total Apex Coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
            echo "❌ Coverage $COVERAGE% is below threshold $THRESHOLD%"
            exit 1
          fi
          echo "✅ Coverage meets threshold"

      - name: Check for destructive changes
        run: |
          if [[ -f delta_package/destructiveChanges.xml ]]; then
            MEMBERS=$(grep -c "<members>" delta_package/destructiveChanges.xml || echo 0)
            if [[ $MEMBERS -gt 0 ]]; then
              echo "⚠️  DESTRUCTIVE CHANGES DETECTED"
              echo "Please review before approval:"
              cat delta_package/destructiveChanges.xml
            fi
          fi

  checkmarx-sast:
    name: CheckMarx AST Scan
    runs-on: ubuntu-latest
    needs: [setup]
    if: needs.setup.outputs.run-checkmarx == 'true' && (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run CheckMarx AST scan
        run: |
          echo "🔍 Running CheckMarx AST Scan..."
          # CheckMarx scan step implementation
          # This would integrate with CheckMarx API using ${{ secrets.CX_CLIENT_SECRET }}
          echo "CheckMarx scan completed (placeholder)"

  fortify-sast-dast:
    name: Fortify SAST + DAST
    runs-on: ubuntu-latest
    needs: [setup]
    if: needs.setup.outputs.run-fortify == 'true' && (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Fortify SAST scan
        run: |
          echo "🔍 Running Fortify SAST Scan..."
          # Fortify scan step implementation
          # This would integrate with Fortify API using ${{ secrets.FOD_CLIENT_SECRET }}
          echo "Fortify scan completed (placeholder)"

  approval-merge-gate:
    name: Approval + Merge Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_review' && github.event.review.state == 'approved'
    outputs:
      merge_commit_sha: ${{ steps.merge-pr.outputs.merge_commit_sha }}
    steps:
      - name: Check approval freshness
        uses: actions/github-script@v7
        with:
          script: |
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            
            const approvals = reviews.filter(r => r.state === 'APPROVED');
            if (approvals.length === 0) {
              throw new Error('No approvals found');
            }
            
            const latestApproval = approvals[approvals.length - 1];
            const approvalTime = new Date(latestApproval.submitted_at);
            const now = new Date();
            const hoursSinceApproval = (now - approvalTime) / (1000 * 60 * 60);
            
            if (hoursSinceApproval > 24) {
              throw new Error(`Approval is ${hoursSinceApproval.toFixed(1)} hours old (max 24 hours)`);
            }
            
            console.log(`✅ Approval is fresh (${hoursSinceApproval.toFixed(1)} hours old)`);

      - name: Merge PR
        id: merge-pr
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              merge_method: 'squash'
            });
            
            core.setOutput('merge_commit_sha', pr.sha);
            console.log(`✅ PR merged with commit SHA: ${pr.sha}`);

  deploy-after-merge:
    name: Deploy to UAT
    runs-on: ubuntu-latest
    needs: [approval-merge-gate]
    if: github.event_name == 'pull_request' && github.ref == 'refs/heads/uat'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build delta package for deployment
        id: delta-deploy
        run: |
          set -euo pipefail
          npm install sfdx-git-delta
          
          MERGE_BASE=$(git rev-parse HEAD~1)
          MERGE_COMMIT=$(git rev-parse HEAD)
          
          echo "Building delta from $MERGE_BASE to $MERGE_COMMIT"
          npx sfdx-git-delta --from $MERGE_BASE --to HEAD --output delta_package || {
            echo "Using DELTA_FROM_COMMIT fallback: ${{ env.DELTA_FROM_COMMIT }}"
            MERGE_BASE="${{ env.DELTA_FROM_COMMIT }}"
            npx sfdx-git-delta --from $MERGE_BASE --to HEAD --output delta_package
          }
          
          echo "merge_base=$MERGE_BASE" >> $GITHUB_OUTPUT
          echo "merge_commit=$MERGE_COMMIT" >> $GITHUB_OUTPUT

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate to org
        run: |
          echo "${{ secrets[env.SFDX_AUTH_SECRET_NAME] }}" > auth.sfdx-url
          sf org login sfdx-url --sfdx-url-file auth.sfdx-url --alias ${{ env.ORG_ALIAS }} --set-default
          rm auth.sfdx-url

      - name: Deploy to UAT
        run: |
          set -euo pipefail
          sf project deploy start \
            --source-dir delta_package \
            --async \
            --wait 120 \
            --verbose

      - name: Build deployment info
        run: |
          mkdir -p deployment-info
          cp -r delta_package/* deployment-info/ || true
          cat > deployment-info/deployment-info.json << 'JSON'
          {
            "deploy_timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "merge_base": "${{ steps.delta-deploy.outputs.merge_base }}",
            "merge_commit": "${{ steps.delta-deploy.outputs.merge_commit }}",
            "uat_branch": "uat",
            "deployed_by": "${{ github.actor }}"
          }
          JSON

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: uat-deployment
          path: deployment-info/
          retention-days: 90

      - name: Commit package to pr_packages branch
        run: |
          set -euo pipefail
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "GitHub Actions"
          
          git checkout --orphan pr_packages || git checkout pr_packages
          git rm -rf . || true
          cp -r deployment-info/* . || true
          git add .
          git commit -m "Package from merge commit ${{ steps.delta-deploy.outputs.merge_commit }}" || echo "No changes to commit"
          git push origin pr_packages --force

      - name: Update DELTA_FROM_COMMIT variable
        run: |
          set -euo pipefail
          curl -L -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/variables/DELTA_FROM_COMMIT \
            -d "{\"name\":\"DELTA_FROM_COMMIT\",\"value\":\"${{ steps.delta-deploy.outputs.merge_commit }}\"}"

  trigger-crt-tests:
    name: CRT Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-after-merge]
    if: success()
    steps:
      - name: Trigger CRT build
        id: crt
        run: |
          set -euo pipefail
          CRT_API_ENDPOINT="https://graphql.eu-robotic.copado.com/v1"
          PROJECT_ID="${{ env.CRT_PROJECT_ID }}"
          JOB_ID="${{ env.CRT_JOB_ID }}"
          
          MUTATION='
            mutation {
              createBuild(projectId: '$PROJECT_ID', jobId: '$JOB_ID') {
                id
                status
              }
            }
          '
          
          BUILD_RESPONSE=$(curl -s -X POST $CRT_API_ENDPOINT \
            -H "Content-Type: application/json" \
            -H "X-Authorization: ${{ secrets.CRT_API_TOKEN }}" \
            -d "{\"query\":\"$MUTATION\"}")
          
          BUILD_ID=$(echo "$BUILD_RESPONSE" | jq -r '.data.createBuild.id')
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
          echo "Build ID: $BUILD_ID"
          
          # Poll for CRT test completion
          for i in {1..120}; do
            QUERY="query { latestBuilds(projectId: $PROJECT_ID, resultSize: 50) { id status } }"
            STATUS_RESPONSE=$(curl -s -X POST $CRT_API_ENDPOINT \
              -H "Content-Type: application/json" \
              -H "X-Authorization: ${{ secrets.CRT_API_TOKEN }}" \
              -d "{\"query\":\"$QUERY\"}")
            
            STATUS=$(echo "$STATUS_RESPONSE" | jq -r '.data.latestBuilds[0].status')
            if [[ "$STATUS" == "passed" || "$STATUS" == "failed" || "$STATUS" == "error" ]]; then
              echo "crt_status=$STATUS" >> $GITHUB_OUTPUT
              break
            fi
            
            echo "Build status: $STATUS (attempt $i/120)"
            sleep 30
          done

      - name: Fetch PR metadata
        id: pr-meta
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number
              });
              
              const { data: reviews } = await github.rest.pulls.listReviews({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number
              });
              
              const approvals = reviews.filter(r => r.state === 'APPROVED');
              const approver = approvals.length > 0 ? approvals[approvals.length - 1].user.login : 'Unknown';
              
              core.setOutput('pr_number', pr.number);
              core.setOutput('pr_raiser', pr.user.login);
              core.setOutput('pr_approver', approver);
              core.setOutput('has_pr', 'true');
            } catch (error) {
              core.setOutput('has_pr', 'false');
            }

      - name: Print Job Summary
        if: always() && steps.pr-meta.outputs.has_pr == 'true'
        run: |
          cat << 'EOF'
          ╔══════════════════════════════════════════╗
          ║        CRT Job Execution Summary         ║
          ╠══════════════════════════════════════════╣
            PR Number       : #${{ steps.pr-meta.outputs.pr_number }}
            Workflow Run #  : ${{ github.run_number }}
            PR Raiser       : ${{ steps.pr-meta.outputs.pr_raiser }}
            PR Approver     : ${{ steps.pr-meta.outputs.pr_approver }}
            Test Build ID   : ${{ steps.crt.outputs.build_id }}
            Test Result     : ${{ steps.crt.outputs.crt_status }}
          ╚══════════════════════════════════════════╝
          EOF

      - name: Post CRT result to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const buildId = '${{ steps.crt.outputs.build_id }}';
            const status = '${{ steps.crt.outputs.crt_status }}';
            const icon = status === 'passed' ? '✅' : status === 'failed' ? '❌' : '⏳';
            
            const comment = `## ${icon} CRT Test Result\n\n- **Build ID:** ${buildId}\n- **Status:** ${status}\n- **Dashboard:** https://eu-robotic.copado.com/builds/${buildId}`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });

  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'rollback'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate rollback input
        run: |
          if [[ -z "${{ github.event.inputs.rollback_commit_sha }}" ]]; then
            echo "❌ rollback_commit_sha is required"
            exit 1
          fi
          echo "Rollback target: ${{ github.event.inputs.rollback_commit_sha }}"

      - name: Build rollback delta
        run: |
          set -euo pipefail
          npm install sfdx-git-delta
          
          FROM="${{ github.event.inputs.rollback_commit_sha }}"
          TO="HEAD"
          
          echo "Building rollback delta from $FROM to $TO"
          npx sfdx-git-delta --from $FROM --to $TO --output rollback_package --generateDelta

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate to org
        run: |
          echo "${{ secrets[env.SFDX_AUTH_SECRET_NAME] }}" > auth.sfdx-url
          sf org login sfdx-url --sfdx-url-file auth.sfdx-url --alias ${{ env.ORG_ALIAS }} --set-default
          rm auth.sfdx-url

      - name: Deploy rollback
        run: |
          set -euo pipefail
          sf project deploy start \
            --source-dir rollback_package \
            --async \
            --wait 120 \
            --verbose

      - name: Post rollback summary
        uses: actions/github-script@v7
        with:
          script: |
            const comment = `## 🔄 Rollback Completed\n\n- **Rollback to:** ${{ github.event.inputs.rollback_commit_sha }}\n- **Triggered by:** ${{ github.actor }}\n- **PR Reference:** #${{ github.event.inputs.rollback_pr_number || 'N/A' }}`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number || 1,
              body: comment
            });
