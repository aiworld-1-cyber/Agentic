name: UAT End-to-End Pipeline

on:
  pull_request:
    branches: [uat]
    paths:
      - 'force-app/**'
      - '.github/workflows/e2e-uat-pipeline.yml'
      - '.github/sf-scanner-waivers.csv'
    types: [opened, reopened, synchronize, edited, ready_for_review]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      scanner:
        description: 'Security scanners to enable'
        required: true
        type: choice
        default: 'all'
        options:
          - 'all'
          - 'checkmarx'
          - 'fortify'
      action:
        description: 'Action to perform'
        required: true
        type: choice
        default: 'deploy'
        options:
          - 'deploy'
          - 'rollback'
      rollback_commit_sha:
        description: 'Commit SHA to rollback to (for rollback action)'
        required: false
        type: string
      rollback_pr_number:
        description: 'PR number for rollback reference'
        required: false
        type: string

env:
  ORG_ALIAS: ${{ vars.ORG_ALIAS || 'uat' }}
  COVERAGE_THRESHOLD: ${{ vars.COVERAGE_THRESHOLD || '85' }}
  SOURCE_DIR: ${{ vars.SOURCE_DIR || 'force-app/main/default' }}
  SFDX_AUTH_SECRET_NAME: ${{ vars.SFDX_AUTH_SECRET_NAME || 'CRT_UAT_AUTHURL' }}
  SCA_ENFORCEMENT_MODE: ${{ vars.SCA_ENFORCEMENT_MODE || 'enforce' }}
  DELTA_FROM_COMMIT: ${{ vars.DELTA_FROM_COMMIT }}
  FCLI_BOOTSTRAP_VERSION: ${{ vars.FCLI_BOOTSTRAP_VERSION || '2.27.1' }}

jobs:
  setup:
    name: Setup - Evaluate Scanner Availability
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request_review'
    outputs:
      run-checkmarx: ${{ steps.check-scanners.outputs.run-checkmarx }}
      run-fortify: ${{ steps.check-scanners.outputs.run-fortify }}
    steps:
      - name: Evaluate scanner availability
        id: check-scanners
        run: |
          if [[ -n "${{ secrets.CX_CLIENT_SECRET }}" ]]; then
            echo "run-checkmarx=true" >> "$GITHUB_OUTPUT"
          else
            echo "run-checkmarx=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ -n "${{ secrets.FOD_CLIENT_SECRET }}" ]]; then
            echo "run-fortify=true" >> "$GITHUB_OUTPUT"
          else
            echo "run-fortify=false" >> "$GITHUB_OUTPUT"
          fi

  salesforce-validation:
    name: Salesforce PR Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      has_delta: ${{ steps.has-delta.outputs.has_delta }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bootstrap package.json if missing
        run: |
          if [[ ! -f package.json ]]; then
            cat > package.json << 'PACKAGE_EOF'
          {
            "name": "salesforce-uat-project",
            "version": "1.0.0",
            "description": "Salesforce UAT Deployment Project",
            "scripts": {
              "lint": "eslint .",
              "format": "prettier --write .",
              "test": "jest"
            },
            "devDependencies": {
              "@salesforce/eslint-config-lwc": "^3.5.0",
              "@salesforce/eslint-plugin-aura": "^2.4.0",
              "eslint": "^8.56.0",
              "prettier": "^3.2.0",
              "jest": "^29.7.0",
              "husky": "^8.0.0"
            }
          }
          PACKAGE_EOF
          fi

      - name: Install dependencies
        run: npm install

      - name: Install Salesforce CLI
        run: |
          npm install --global @salesforce/cli@${{ env.FCLI_BOOTSTRAP_VERSION }}

      - name: Authenticate Salesforce org
        run: |
          echo "${{ secrets[env.SFDX_AUTH_SECRET_NAME] }}" > /tmp/sfdx_auth
          sf org login sfdx-url --sfdx-url-file=/tmp/sfdx_auth --alias ${{ env.ORG_ALIAS }} --set-default
          rm /tmp/sfdx_auth

      - name: Extract test classes from PR body
        id: extract-tests
        run: |
          TESTS=$(echo "${{ github.event.pull_request.body }}" | grep -oP '(?<=Tests:)[^}]*' | head -1 | xargs || echo "")
          echo "test_classes=${TESTS}" >> "$GITHUB_OUTPUT"

      - name: Install sfdx-git-delta
        run: npm install -g sfdx-git-delta

      - name: Build delta package
        id: delta_pkg
        run: |
          set -euo pipefail
          
          FROM_COMMIT="${{ env.DELTA_FROM_COMMIT }}"
          TO_COMMIT="HEAD"
          
          if [[ -z "$FROM_COMMIT" ]]; then
            FROM_COMMIT=$(git merge-base origin/uat HEAD)
          fi
          
          sgd --repo . --from "$FROM_COMMIT" --to "$TO_COMMIT" --output delta_pkg --generate-delta
          
          if [[ -f delta_pkg/package/package.xml ]]; then
            echo "has_delta_pkg=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_delta_pkg=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload delta package artifact
        if: steps.delta_pkg.outputs.has_delta_pkg == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: delta-package
          path: delta_pkg
          retention-days: 30

      - name: Check delta for members
        id: has-delta
        run: |
          set -euo pipefail
          
          HAS_DELTA=false
          
          if [[ -f delta_pkg/package/package.xml ]] && grep -q '<members>' delta_pkg/package/package.xml; then
            HAS_DELTA=true
          fi
          
          if [[ -f delta_pkg/destructiveChanges/destructiveChanges.xml ]] && grep -q '<members>' delta_pkg/destructiveChanges/destructiveChanges.xml; then
            HAS_DELTA=true
          fi
          
          echo "has_delta=${HAS_DELTA}" >> "$GITHUB_OUTPUT"

      - name: Compute Apex delta
        if: steps.has-delta.outputs.has_delta == 'true'
        id: apex-delta
        run: |
          set -euo pipefail
          
          TEST_CLASSES="${{ steps.extract-tests.outputs.test_classes }}"
          
          # Auto-infer test classes by suffix
          if [[ -d delta_pkg/force-app/main/default/classes ]]; then
            AUTO_TESTS=$(find delta_pkg/force-app/main/default/classes -name '*Test*.cls' -o -name '*TestClass*.cls' | sed 's/.*\/\([^/]*\)\.cls/\1/' | tr '\n' ',' | sed 's/,$//')
            if [[ -n "$AUTO_TESTS" ]]; then
              if [[ -n "$TEST_CLASSES" ]]; then
                TEST_CLASSES="${TEST_CLASSES},${AUTO_TESTS}"
              else
                TEST_CLASSES="$AUTO_TESTS"
              fi
            fi
          fi
          
          echo "inferred_tests=${TEST_CLASSES}" >> "$GITHUB_OUTPUT"

      - name: Deploy validation (async)
        if: steps.has-delta.outputs.has_delta == 'true'
        id: validate
        run: |
          set -euo pipefail
          
          TEST_CLASSES="${{ steps.apex-delta.outputs.inferred_tests }}"
          
          # Build deployment command
          DEPLOY_CMD="sf project deploy validate --source-dir delta_pkg/force-app/main/default --wait 0 --json"
          
          # Only add test-level if we have Apex classes
          if [[ -d delta_pkg/force-app/main/default/classes ]] && grep -q 'ApexClass' delta_pkg/package/package.xml; then
            if [[ -n "$TEST_CLASSES" ]]; then
              DEPLOY_CMD="$DEPLOY_CMD --test-level RunSpecifiedTests --tests ${TEST_CLASSES}"
            else
              DEPLOY_CMD="$DEPLOY_CMD --test-level RunLocalTests"
            fi
          fi
          
          RESULT=$($DEPLOY_CMD)
          echo "$RESULT" > deploy-result.json
          DEPLOY_ID=$(echo "$RESULT" | jq -r '.result.id // .result[0].id')
          echo "deploy_id=${DEPLOY_ID}" >> "$GITHUB_OUTPUT"

      - name: Poll deployment status
        if: steps.has-delta.outputs.has_delta == 'true'
        run: |
          set -euo pipefail
          
          DEPLOY_ID="${{ steps.validate.outputs.deploy_id }}"
          POLL_INTERVAL=15
          MAX_POLLS=240
          COUNT=0
          
          while [[ $COUNT -lt $MAX_POLLS ]]; do
            STATUS=$(sf project deploy report --job-id "$DEPLOY_ID" --json | jq -r '.result.status')
            
            case "$STATUS" in
              Succeeded|Failed|Canceled)
                echo "Deployment $STATUS"
                break
                ;;
              *)
                echo "[$((COUNT+1))/$MAX_POLLS] Status: $STATUS - polling again in ${POLL_INTERVAL}s..."
                sleep $POLL_INTERVAL
                ((COUNT++))
                ;;
            esac
          done

      - name: Check deployment results
        if: steps.has-delta.outputs.has_delta == 'true'
        run: |
          set -euo pipefail
          
          DEPLOY_ID="${{ steps.validate.outputs.deploy_id }}"
          RESULT=$(sf project deploy report --job-id "$DEPLOY_ID" --json)
          
          STATUS=$(echo "$RESULT" | jq -r '.result.status')
          if [[ "$STATUS" != "Succeeded" ]]; then
            echo "Deployment failed with status: $STATUS"
            echo "$RESULT" | jq '.'
            exit 1
          fi
          
          # Show component breakdown
          echo "## Component Breakdown"
          echo "$RESULT" | jq '.result.deployedSource[] | "- \(.name) (\(.type))"' -r

      - name: Check Apex coverage
        if: steps.has-delta.outputs.has_delta == 'true'
        run: |
          set -euo pipefail
          
          DEPLOY_ID="${{ steps.validate.outputs.deploy_id }}"
          RESULT=$(sf project deploy report --job-id "$DEPLOY_ID" --json)
          
          COVERAGE=$(echo "$RESULT" | jq -r '.result.numberTestsCompleted as $total | .result.numberTestsCompleted as $run | if $total > 0 then (($run / $total) * 100) else 0 end | floor')
          
          echo "Apex Coverage: ${COVERAGE}%"
          
          if [[ $COVERAGE -lt ${{ env.COVERAGE_THRESHOLD }} ]]; then
            echo "❌ Coverage ${COVERAGE}% is below threshold ${{ env.COVERAGE_THRESHOLD }}%"
            exit 1
          else
            echo "✅ Coverage ${COVERAGE}% meets threshold ${{ env.COVERAGE_THRESHOLD }}%"
          fi

      - name: Install Salesforce Scanner
        if: steps.has-delta.outputs.has_delta == 'true' && env.SCA_ENFORCEMENT_MODE != 'off'
        run: sf plugins install @salesforce/sfdx-scanner

      - name: Detect waiver file tampering
        if: steps.has-delta.outputs.has_delta == 'true' && env.SCA_ENFORCEMENT_MODE != 'off'
        run: |
          if git diff --name-only origin/uat HEAD | grep -q '\.github/sf-scanner-waivers\.csv'; then
            echo "⚠️  Warning: .github/sf-scanner-waivers.csv was modified in this PR"
            echo "Note: Waivers are always read from the main branch, not the PR branch"
          fi

      - name: Fetch SCA waivers from main
        if: steps.has-delta.outputs.has_delta == 'true' && env.SCA_ENFORCEMENT_MODE != 'off'
        id: fetch-waivers
        run: |
          set -euo pipefail
          
          WAIVER_FILE=".github/sf-scanner-waivers.csv"
          
          # Try to fetch from main/default branch via GitHub API
          RESPONSE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/contents/$WAIVER_FILE?ref=main" || true)
          
          if echo "$RESPONSE" | jq -e '.content' > /dev/null 2>&1; then
            echo "$RESPONSE" | jq -r '.content' | base64 -d > fetched-waivers.csv
            echo "✅ Waivers fetched from main branch"
          elif echo "$RESPONSE" | jq -e '.message' | grep -q "404"; then
            echo "⚠️  No waiver file found on main branch - continuing without waivers"
            touch fetched-waivers.csv
          else
            echo "⚠️  Could not fetch waivers - continuing without waivers"
            touch fetched-waivers.csv
          fi

      - name: Detect changed source files for SCA
        if: steps.has-delta.outputs.has_delta == 'true' && env.SCA_ENFORCEMENT_MODE != 'off'
        id: changed-files
        run: |
          set -euo pipefail
          
          CHANGED_FILES=$(git diff --name-only origin/uat HEAD | grep -E '\.(cls|trigger|js|html|css)$' | tr '\n' ',' | sed 's/,$//' || echo "")
          echo "changed_files=${CHANGED_FILES}" >> "$GITHUB_OUTPUT"

      - name: Run Salesforce Code Analyzer
        if: steps.has-delta.outputs.has_delta == 'true' && steps.changed-files.outputs.changed_files && env.SCA_ENFORCEMENT_MODE != 'off'
        continue-on-error: true
        run: |
          set -euo pipefail
          
          CHANGED_FILES="${{ steps.changed-files.outputs.changed_files }}"
          sf scanner run --target "$CHANGED_FILES" --format csv --outfile sfdx-report.csv --severity-threshold 3 || true

      - name: Check SCA results against waivers
        if: steps.has-delta.outputs.has_delta == 'true' && steps.changed-files.outputs.changed_files && env.SCA_ENFORCEMENT_MODE != 'off'
        id: sca-check
        run: |
          set -euo pipefail
          
          # Bash + jq script for waiver checking
          REPORT_FILE="sfdx-report.csv"
          WAIVER_FILE="fetched-waivers.csv"
          OUTPUT_FILE="sca-governance-report.csv"
          
          # Parse CSV and check waivers
          if [[ ! -f "$REPORT_FILE" ]]; then
            echo "No SCA report found"
            exit 0
          fi
          
          TODAY=$(date -u +%s)
          FAILED=0
          
          # Create output header
          echo "Status,Rule,File,Line,Severity,Description,Expiry,Days_Left,Reason,Approved_By,Approved_Date,Ticket" > "$OUTPUT_FILE"
          
          # Read each violation
          tail -n +2 "$REPORT_FILE" | while IFS=',' read -r rule file line severity message; do
            STATUS="VIOLATION"
            EXPIRY=""
            DAYS_LEFT=""
            REASON=""
            APPROVED_BY=""
            APPROVED_DATE=""
            TICKET=""
            
            # Check waivers (basic check - in production would be more sophisticated)
            if [[ -f "$WAIVER_FILE" ]]; then
              WAIVER_MATCH=$(grep -F "$file" "$WAIVER_FILE" | grep -F "$rule" | head -1 || true)
              
              if [[ -n "$WAIVER_MATCH" ]]; then
                EXPIRY=$(echo "$WAIVER_MATCH" | cut -d',' -f5)
                REASON=$(echo "$WAIVER_MATCH" | cut -d',' -f6)
                APPROVED_BY=$(echo "$WAIVER_MATCH" | cut -d',' -f7)
                APPROVED_DATE=$(echo "$WAIVER_MATCH" | cut -d',' -f8)
                TICKET=$(echo "$WAIVER_MATCH" | cut -d',' -f9)
                
                # Parse expiry date
                EXPIRY_EPOCH=$(date -d "$EXPIRY" +%s 2>/dev/null || echo "0")
                DAYS_LEFT=$(( ($EXPIRY_EPOCH - $TODAY) / 86400 ))
                
                if [[ $DAYS_LEFT -lt 0 ]]; then
                  STATUS="EXPIRED_WAIVER"
                  ((FAILED++))
                elif [[ $DAYS_LEFT -le 30 ]]; then
                  STATUS="WAIVED_EXPIRING_SOON"
                else
                  STATUS="WAIVED"
                fi
              fi
            fi
            
            echo "$STATUS,$rule,$file,$line,$severity,$message,$EXPIRY,$DAYS_LEFT,$REASON,$APPROVED_BY,$APPROVED_DATE,$TICKET" >> "$OUTPUT_FILE"
          done
          
          echo "SCA check complete - found $FAILED failed waivers"

      - name: Post SCA results to PR
        if: steps.has-delta.outputs.has_delta == 'true' && github.event_name == 'pull_request' && env.SCA_ENFORCEMENT_MODE != 'off'
        run: |
          set -euo pipefail
          
          if [[ ! -f sca-governance-report.csv ]]; then
            exit 0
          fi
          
          # Delete previous SCA comment if exists
          COMMENTS=$(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments --jq '.[].id' -q 2>/dev/null || echo "")
          
          for COMMENT_ID in $COMMENTS; do
            if gh api repos/${{ github.repository }}/issues/comments/$COMMENT_ID --jq '.body' | grep -q 'SCA Governance Report'; then
              gh api -X DELETE repos/${{ github.repository }}/issues/comments/$COMMENT_ID
            fi
          done
          
          # Post new comment
          REPORT_MD="## SCA Governance Report\n\n\`\`\`\n$(cat sca-governance-report.csv | head -20)\n\`\`\`"
          gh pr comment ${{ github.event.pull_request.number }} --body "$REPORT_MD"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SCA reports
        if: steps.has-delta.outputs.has_delta == 'true' && env.SCA_ENFORCEMENT_MODE != 'off'
        uses: actions/upload-artifact@v4
        with:
          name: sfdx-scanner-reports
          path: |
            sfdx-report.csv
            sca-governance-report.csv
            fetched-waivers.csv
          retention-days: 90

  sca-sast-stage:
    name: SCA/SAST Stage - npm Audit
    runs-on: ubuntu-latest
    if: (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch') && vars.SCA_ENFORCEMENT_MODE != 'off'
    needs: [setup]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bootstrap package.json if missing
        run: |
          if [[ ! -f package.json ]]; then
            cat > package.json << 'PACKAGE_EOF'
          {
            "name": "salesforce-uat-project",
            "version": "1.0.0",
            "description": "Salesforce UAT Deployment Project",
            "scripts": {
              "lint": "eslint .",
              "format": "prettier --write .",
              "test": "jest"
            },
            "devDependencies": {
              "@salesforce/eslint-config-lwc": "^3.5.0",
              "@salesforce/eslint-plugin-aura": "^2.4.0",
              "eslint": "^8.56.0",
              "prettier": "^3.2.0",
              "jest": "^29.7.0",
              "husky": "^8.0.0"
            }
          }
          PACKAGE_EOF
          fi

      - name: Install dependencies
        run: npm install

      - name: Run npm audit
        id: audit
        continue-on-error: true
        run: |
          npm audit --json --audit-level=high > audit-output.json 2>/dev/null || true

      - name: Check npm audit waivers
        id: npm-waiver-check
        run: |
          set -euo pipefail
          
          WAIVER_FILE=".github/sca-waivers.json"
          TODAY=$(date -u +%Y-%m-%d)
          FAILED=0
          
          # Check if audit found high/critical vulns
          HIGH_VULNS=$(jq '.vulnerabilities | length' audit-output.json 2>/dev/null || echo "0")
          
          if [[ $HIGH_VULNS -eq 0 ]]; then
            echo "✅ No high/critical vulnerabilities found"
            exit 0
          fi
          
          echo "Found $HIGH_VULNS vulnerabilities - checking waivers..."
          
          # Load waivers
          if [[ -f "$WAIVER_FILE" ]]; then
            WAIVERS=$(jq '.' "$WAIVER_FILE")
          else
            WAIVERS="[]"
          fi
          
          # Process each vulnerability
          jq -r '.vulnerabilities[] | "\(.package)|\(.severity)|\(.cves[0] // .advisories[0] // "")"' audit-output.json | while IFS='|' read -r package severity cve; do
            WAIVED=false
            
            # Check if waiver exists
            WAIVER=$(echo "$WAIVERS" | jq --arg pkg "$package" --arg sev "$severity" '.[] | select(.package == $pkg and .severity == $sev)' 2>/dev/null || echo "")
            
            if [[ -n "$WAIVER" ]]; then
              EXPIRY=$(echo "$WAIVER" | jq -r '.expires')
              
              if [[ "$EXPIRY" < "$TODAY" ]]; then
                echo "❌ Expired waiver for $package ($severity)"
                ((FAILED++))
              else
                echo "✅ Waived: $package ($severity) expires $EXPIRY"
                WAIVED=true
              fi
            else
              echo "⚠️  No waiver for $package ($severity)"
            fi
          done
          
          if [[ $FAILED -gt 0 ]]; then
            echo "❌ $FAILED expired waivers found"
            if [[ "${{ vars.SCA_ENFORCEMENT_MODE }}" == "enforce" ]]; then
              exit 1
            fi
          fi

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: audit-output.json
          retention-days: 90

  automated-governance:
    name: Automated Governance - Hard Gates
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [salesforce-validation]
    steps:
      - name: Validate PR has delta
        run: |
          if [[ "${{ needs.salesforce-validation.outputs.has_delta }}" != "true" ]]; then
            echo "ℹ️  No delta detected - skipping governance gates"
            exit 0
          fi

  checkmarx-sast:
    name: CheckMarx AST Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    needs: [setup]
    # Placeholder - implement with actual CheckMarx integration
    steps:
      - name: Check if CheckMarx enabled
        if: needs.setup.outputs.run-checkmarx == 'true'
        run: echo "CheckMarx scanning enabled"

  fortify-sast-dast:
    name: Fortify SAST + DAST
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    needs: [setup]
    # Placeholder - implement with actual Fortify integration
    steps:
      - name: Check if Fortify enabled
        if: needs.setup.outputs.run-fortify == 'true'
        run: echo "Fortify scanning enabled"

  approval-merge-gate:
    name: Approval & Merge Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_review' && github.event.review.state == 'approved'
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Verify approval freshness
        run: |
          APPROVAL_TIME="${{ github.event.review.submitted_at }}"
          NOW=$(date -u +%s)
          APPROVAL_EPOCH=$(date -d "$APPROVAL_TIME" +%s 2>/dev/null || echo $NOW)
          
          AGE_HOURS=$(( ($NOW - $APPROVAL_EPOCH) / 3600 ))
          
          if [[ $AGE_HOURS -gt 24 ]]; then
            echo "⚠️  Approval is more than 24 hours old"
          else
            echo "✅ Approval is fresh ($AGE_HOURS hours old)"
          fi

      - name: Merge PR
        run: |
          gh pr merge ${{ github.event.pull_request.number }} --merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get merge commit SHA
        id: merge-info
        run: |
          MERGE_SHA=$(gh pr view ${{ github.event.pull_request.number }} --json mergeCommit -q '.mergeCommit.oid')
          echo "merge_commit_sha=${MERGE_SHA}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-after-merge:
    name: Deploy to UAT
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_review' || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy')
    needs: [approval-merge-gate]
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: uat

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli@${{ env.FCLI_BOOTSTRAP_VERSION }}

      - name: Authenticate org
        run: |
          echo "${{ secrets[env.SFDX_AUTH_SECRET_NAME] }}" > /tmp/sfdx_auth
          sf org login sfdx-url --sfdx-url-file=/tmp/sfdx_auth --alias ${{ env.ORG_ALIAS }} --set-default
          rm /tmp/sfdx_auth

      - name: Build delta package for deployment
        id: delta_pkg
        run: |
          set -euo pipefail
          
          npm install -g sfdx-git-delta
          
          # Use HEAD^1 (merge parent = UAT tip before merge)
          FROM_COMMIT=$(git rev-parse HEAD^1 2>/dev/null || echo "${{ env.DELTA_FROM_COMMIT }}")
          TO_COMMIT="HEAD"
          
          sgd --repo . --from "$FROM_COMMIT" --to "$TO_COMMIT" --output delta_pkg --generate-delta
          
          echo "merge_base=${FROM_COMMIT}" >> "$GITHUB_OUTPUT"

      - name: Deploy to UAT (async)
        id: deploy
        run: |
          set -euo pipefail
          
          DEPLOY_CMD="sf project deploy start --source-dir delta_pkg/force-app/main/default --wait 0 --json"
          
          RESULT=$($DEPLOY_CMD)
          DEPLOY_ID=$(echo "$RESULT" | jq -r '.result.id')
          echo "deploy_id=${DEPLOY_ID}" >> "$GITHUB_OUTPUT"

      - name: Poll deployment
        run: |
          set -euo pipefail
          
          DEPLOY_ID="${{ steps.deploy.outputs.deploy_id }}"
          POLL_INTERVAL=15
          MAX_POLLS=240
          COUNT=0
          
          while [[ $COUNT -lt $MAX_POLLS ]]; do
            STATUS=$(sf project deploy report --job-id "$DEPLOY_ID" --json | jq -r '.result.status' 2>/dev/null || echo "Pending")
            
            case "$STATUS" in
              Succeeded|Failed|Canceled)
                echo "Deployment $STATUS"
                break
                ;;
              *)
                echo "[$((COUNT+1))/$MAX_POLLS] Status: $STATUS"
                sleep $POLL_INTERVAL
                ((COUNT++))
                ;;
            esac
          done

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: delta_pkg
          retention-days: 90

      - name: Update DELTA_FROM_COMMIT variable
        run: |
          set -euo pipefail
          
          NEW_DELTA=$(git rev-parse HEAD)
          
          curl -L -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/variables/DELTA_FROM_COMMIT" \
            -d "{\"name\":\"DELTA_FROM_COMMIT\",\"value\":\"$NEW_DELTA\"}"

  trigger-crt-tests:
    name: Trigger CRT Smoke Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_review'
    needs: [deploy-after-merge]
    steps:
      - name: Trigger CRT build
        id: crt
        run: |
          set -euo pipefail
          
          CRT_API_URL="https://graphql.eu-robotic.copado.com/v1"
          PROJECT_ID="${{ vars.CRT_PROJECT_ID || '73283' }}"
          JOB_ID="${{ vars.CRT_JOB_ID || '115686' }}"
          ORG_ID="${{ vars.CRT_ORG_ID || '43532' }}"
          
          # Create build mutation
          MUTATION='mutation {
            createBuild(
              projectId: "'"$PROJECT_ID"'"
              jobId: "'"$JOB_ID"'"
              orgId: "'"$ORG_ID"'"
            ) {
              id
              status
            }
          }'
          
          # Trigger build
          BUILD_RESPONSE=$(curl -s -X POST "$CRT_API_URL" \
            -H "X-Authorization: ${{ secrets.CRT_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"$MUTATION\"}")
          
          BUILD_ID=$(echo "$BUILD_RESPONSE" | jq -r '.data.createBuild.id')
          echo "build_id=${BUILD_ID}" >> "$GITHUB_OUTPUT"
          
          # Poll for completion
          POLL_COUNT=0
          MAX_POLLS=120
          
          while [[ $POLL_COUNT -lt $MAX_POLLS ]]; do
            QUERY='query {
              latestBuilds(projectId: "'"$PROJECT_ID"'", resultSize: 50) {
                id
                status
              }
            }'
            
            RESPONSE=$(curl -s -X POST "$CRT_API_URL" \
              -H "X-Authorization: ${{ secrets.CRT_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"$QUERY\"}")
            
            STATUS=$(echo "$RESPONSE" | jq -r '.data.latestBuilds[0].status' 2>/dev/null || echo "executing")
            
            case "$STATUS" in
              executing)
                echo "CRT Status: $STATUS - polling ($((POLL_COUNT+1))/$MAX_POLLS)"
                sleep 30
                ((POLL_COUNT++))
                ;;
              passed|failed|error|cancelled|skipped)
                echo "crt_status=${STATUS}" >> "$GITHUB_OUTPUT"
                break
                ;;
              *)
                sleep 30
                ((POLL_COUNT++))
                ;;
            esac
          done

      - name: Get PR metadata
        id: pr_meta
        if: always()
        run: |
          set -euo pipefail
          
          PR_DATA=$(gh pr view ${{ github.event.pull_request.number }} --json author,reviews,number -q '.')
          PR_NUMBER=$(echo "$PR_DATA" | jq -r '.number')
          PR_AUTHOR=$(echo "$PR_DATA" | jq -r '.author.login')
          APPROVER=$(echo "$PR_DATA" | jq -r '.reviews[-1].author.login // "N/A"')
          
          echo "has_pr=true" >> "$GITHUB_OUTPUT"
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "pr_author=${PR_AUTHOR}" >> "$GITHUB_OUTPUT"
          echo "pr_approver=${APPROVER}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print CRT Job Summary
        if: always() && steps.pr_meta.outputs.has_pr == 'true'
        run: |
          cat << 'SUMMARY_EOF'
          ╔══════════════════════════════════════════╗
          ║        CRT Job Execution Summary         ║
          ╠══════════════════════════════════════════╣
          ║ PR Number       : #${{ steps.pr_meta.outputs.pr_number }}
          ║ Workflow Run #  : ${{ github.run_number }}
          ║ PR Raiser       : ${{ steps.pr_meta.outputs.pr_author }}
          ║ PR Approver     : ${{ steps.pr_meta.outputs.pr_approver }}
          ║ Test Build ID   : ${{ steps.crt.outputs.build_id }}
          ║ Test Result     : ${{ steps.crt.outputs.crt_status }}
          ╚══════════════════════════════════════════╝
          SUMMARY_EOF

      - name: Post CRT results to PR
        if: always() && steps.pr_meta.outputs.has_pr == 'true'
        run: |
          STATUS_ICON="🔵"
          case "${{ steps.crt.outputs.crt_status }}" in
            passed) STATUS_ICON="✅" ;;
            failed) STATUS_ICON="❌" ;;
            error) STATUS_ICON="⚠️" ;;
          esac
          
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "## CRT Test Results
          
          $STATUS_ICON **Status:** ${{ steps.crt.outputs.crt_status }}
          🆔 **Build ID:** ${{ steps.crt.outputs.build_id }}
          
          [View in CRT Dashboard](https://robotic.copado.com/)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'rollback'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: uat

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install tools
        run: |
          npm install -g @salesforce/cli@${{ env.FCLI_BOOTSTRAP_VERSION }} sfdx-git-delta

      - name: Authenticate org
        run: |
          echo "${{ secrets[env.SFDX_AUTH_SECRET_NAME] }}" > /tmp/sfdx_auth
          sf org login sfdx-url --sfdx-url-file=/tmp/sfdx_auth --alias ${{ env.ORG_ALIAS }} --set-default
          rm /tmp/sfdx_auth

      - name: Build rollback package
        id: rollback_pkg
        run: |
          set -euo pipefail
          
          TO_COMMIT="${{ github.event.inputs.rollback_commit_sha }}"
          FROM_COMMIT="HEAD"
          
          # Reverse delta: new metadata becomes destructive
          sgd --repo . --from "$FROM_COMMIT" --to "$TO_COMMIT" --output rollback_pkg --generate-delta --reverse
          
          echo "✅ Rollback package built"

      - name: Deploy rollback (async)
        id: deploy_rollback
        run: |
          set -euo pipefail
          
          DEPLOY_CMD="sf project deploy start --source-dir rollback_pkg/force-app/main/default --pre-destructive-changes rollback_pkg/destructiveChanges/destructiveChanges.xml --wait 0 --json"
          
          RESULT=$($DEPLOY_CMD)
          DEPLOY_ID=$(echo "$RESULT" | jq -r '.result.id')
          echo "deploy_id=${DEPLOY_ID}" >> "$GITHUB_OUTPUT"

      - name: Poll rollback deployment
        run: |
          set -euo pipefail
          
          DEPLOY_ID="${{ steps.deploy_rollback.outputs.deploy_id }}"
          POLL_INTERVAL=15
          MAX_POLLS=240
          COUNT=0
          
          while [[ $COUNT -lt $MAX_POLLS ]]; do
            STATUS=$(sf project deploy report --job-id "$DEPLOY_ID" --json | jq -r '.result.status' 2>/dev/null || echo "Pending")
            
            case "$STATUS" in
              Succeeded|Failed|Canceled)
                echo "Rollback deployment $STATUS"
                break
                ;;
              *)
                echo "[$((COUNT+1))/$MAX_POLLS] Status: $STATUS"
                sleep $POLL_INTERVAL
                ((COUNT++))
                ;;
            esac
          done
